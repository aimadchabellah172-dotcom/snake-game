<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثعبان بسيط - النسخة الخفيفة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #0f172a; /* كحلي غامق مريح */
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            margin: 0;
            user-select: none;
            touch-action: none;
        }

        #game-canvas {
            background-color: #1e293b;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            max-width: 90vw;
            max-height: 70vh;
        }

        .stats-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem 2rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background-color: #38bdf8;
            color: #0f172a;
            font-weight: 800;
            padding: 0.75rem 2.5rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background-color: #7dd3fc;
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- قائمة البداية -->
    <div id="start-screen" class="flex flex-col items-center gap-6">
        <h1 class="text-6xl font-black tracking-tight text-sky-400 mb-4">ثعبان</h1>
        <div class="stats-card text-center">
            <p class="text-sm text-slate-400 uppercase tracking-widest mb-1">أفضل نتيجة</p>
            <p id="high-score" class="text-3xl font-bold">0</p>
        </div>
        <button onclick="startGame()" class="btn-primary text-xl">ابدأ اللعب</button>
    </div>

    <!-- واجهة اللعـب -->
    <div id="game-screen" class="hidden flex flex-col items-center gap-6 w-full">
        <div class="flex gap-4 w-full max-w-[500px] justify-between">
            <div class="stats-card flex-1 text-center">
                <p class="text-xs text-slate-400">النقاط</p>
                <p id="current-score" class="text-2xl font-bold">0</p>
            </div>
            <button onclick="resetGame()" class="p-4 bg-slate-800 rounded-xl hover:bg-slate-700 transition-colors">
                <i data-lucide="rotate-ccw" class="w-6 h-6"></i>
            </button>
        </div>
        
        <canvas id="game-canvas"></canvas>

        <div class="grid grid-cols-3 gap-2 mt-4 lg:hidden">
            <div></div>
            <button class="bg-slate-800 p-4 rounded-lg" onclick="setDirection('UP')"><i data-lucide="chevron-up"></i></button>
            <div></div>
            <button class="bg-slate-800 p-4 rounded-lg" onclick="setDirection('LEFT')"><i data-lucide="chevron-right"></i></button>
            <button class="bg-slate-800 p-4 rounded-lg" onclick="setDirection('DOWN')"><i data-lucide="chevron-down"></i></button>
            <button class="bg-slate-800 p-4 rounded-lg" onclick="setDirection('RIGHT')"><i data-lucide="chevron-left"></i></button>
        </div>
        
        <p class="hidden lg:block text-slate-500 text-sm mt-4">استخدم أسهم الكيبورد للتحكم</p>
    </div>

    <!-- شاشة النهاية -->
    <div id="end-screen" class="hidden flex flex-col items-center gap-6">
        <h2 class="text-5xl font-black text-red-400">انتهت اللعبة</h2>
        <div class="stats-card text-center min-w-[200px]">
            <p class="text-sm text-slate-400 mb-1">نقاطك</p>
            <p id="final-score" class="text-4xl font-bold text-sky-400">0</p>
        </div>
        <button onclick="startGame()" class="btn-primary text-xl">حاول ثانية</button>
        <button onclick="showStart()" class="text-slate-400 hover:text-white underline">العودة للرئيسية</button>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        const GRID_SIZE = 20;
        let TILE_COUNT = 20;
        let snake = [];
        let food = { x: 5, y: 5 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameLoop;
        let highScore = localStorage.getItem('snake_simple_hs') || 0;

        document.getElementById('high-score').innerText = highScore;

        function initCanvas() {
            const size = Math.min(window.innerWidth - 40, 500);
            canvas.width = size;
            canvas.height = size;
            TILE_COUNT = Math.floor(canvas.width / GRID_SIZE);
        }

        function startGame() {
            initCanvas();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            snake = [
                { x: 10, y: 10 },
                { x: 10, y: 11 },
                { x: 10, y: 12 }
            ];
            dx = 0;
            dy = -1;
            score = 0;
            document.getElementById('current-score').innerText = score;
            
            clearInterval(gameLoop);
            gameLoop = setInterval(update, 100);
            placeFood();
            lucide.createIcons();
        }

        function update() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // تصادم مع الجدران
            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
                return gameOver();
            }

            // تصادم مع النفس
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                return gameOver();
            }

            snake.unshift(head);

            // أكل الطعام
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('current-score').innerText = score;
                placeFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            const size = canvas.width / TILE_COUNT;
            
            // خلفية
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // الطعام
            ctx.fillStyle = '#f43f5e'; // أحمر وردي للطعام
            ctx.beginPath();
            ctx.roundRect(food.x * size + 2, food.y * size + 2, size - 4, size - 4, 4);
            ctx.fill();

            // الثعبان
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#38bdf8' : '#0ea5e9'; // رأس أفتح وجسم أغمق
                ctx.beginPath();
                ctx.roundRect(segment.x * size + 1, segment.y * size + 1, size - 2, size - 2, 4);
                ctx.fill();
            });
        }

        function placeFood() {
            food = {
                x: Math.floor(Math.random() * TILE_COUNT),
                y: Math.floor(Math.random() * TILE_COUNT)
            };
            // التأكد أن الطعام لا يظهر فوق الثعبان
            if (snake.some(s => s.x === food.x && s.y === food.y)) placeFood();
        }

        function gameOver() {
            clearInterval(gameLoop);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snake_simple_hs', highScore);
                document.getElementById('high-score').innerText = highScore;
            }
        }

        function showStart() {
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        function resetGame() {
            clearInterval(gameLoop);
            startGame();
        }

        function setDirection(dir) {
            if (dir === 'UP' && dy === 0) { dx = 0; dy = -1; }
            if (dir === 'DOWN' && dy === 0) { dx = 0; dy = 1; }
            if (dir === 'LEFT' && dx === 0) { dx = 1; dy = 0; } // العكس بسبب RTL
            if (dir === 'RIGHT' && dx === 0) { dx = -1; dy = 0; }
        }

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' && dy === 0) { dx = 0; dy = -1; }
            if (e.key === 'ArrowDown' && dy === 0) { dx = 0; dy = 1; }
            if (e.key === 'ArrowRight' && dx === 0) { dx = 1; dy = 0; }
            if (e.key === 'ArrowLeft' && dx === 0) { dx = -1; dy = 0; }
        });

        lucide.createIcons();
    </script>
</body>
</html>
