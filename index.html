<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE PRO - النسخة النهائية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #22c55e;
            --bg: #0f172a;
        }
        body {
            background-color: var(--bg);
            color: #f8fafc;
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
            margin: 0;
            user-select: none;
            touch-action: none; /* لمنع التمرير باللمس وفتح المجال للتحكم */
        }

        #loading-screen {
            background: #0f172a;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.25rem;
        }

        canvas {
            background-color: #1e293b;
            border-radius: 1rem;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            display: block;
        }

        .btn-action {
            transition: all 0.2s;
        }
        .btn-action:active { transform: scale(0.9); }

        .hidden { display: none !important; }
        
        @keyframes pulse-custom {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .animate-pulse-custom { animation: pulse-custom 1.5s infinite; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <!-- شاشة التحميل -->
    <div id="loading-screen" class="fixed inset-0 flex flex-col items-center justify-center">
        <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="text-emerald-400 font-bold animate-pulse">جاري التحميل...</h2>
    </div>

    <!-- الواجهة الرئيسية -->
    <div id="main-ui" class="hidden flex flex-col items-center gap-6 w-full max-w-lg p-4">
        
        <!-- الهيدر -->
        <div class="flex justify-between w-full gap-4">
            <div class="glass flex-1 p-3 flex items-center justify-center gap-2">
                <i data-lucide="trophy" class="w-4 h-4 text-amber-400"></i>
                <span id="high-score" class="font-black text-lg">0</span>
            </div>
            <div class="glass flex-1 p-3 flex items-center justify-center gap-2">
                <i data-lucide="gem" class="w-4 h-4 text-emerald-400"></i>
                <span id="gems-count" class="font-black text-lg">0</span>
            </div>
            <button onclick="toggleShop()" class="glass p-3 text-emerald-400 hover:bg-emerald-500/10 transition-colors">
                <i data-lucide="shopping-bag" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- ساحة اللعب -->
        <div class="relative w-full aspect-square max-w-[400px]">
            <canvas id="game-canvas" class="w-full h-full"></canvas>
            
            <div id="game-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/60 rounded-2xl backdrop-blur-sm z-20">
                <div id="start-view" class="flex flex-col items-center gap-4">
                    <h1 class="text-5xl font-black text-white mb-2">SNAKE PRO</h1>
                    <button onclick="startGame()" class="bg-emerald-500 text-slate-900 px-10 py-4 rounded-xl font-black text-xl animate-pulse-custom shadow-lg shadow-emerald-500/20">ابدأ الآن</button>
                </div>
                <div id="over-view" class="hidden flex flex-col items-center gap-4 text-center p-6">
                    <p class="text-sm uppercase tracking-widest text-slate-400">انـتـهـت الـلـعـبـة</p>
                    <h2 id="final-score" class="text-7xl font-black text-emerald-400">0</h2>
                    <button onclick="startGame()" class="bg-white text-slate-900 px-10 py-4 rounded-xl font-black text-xl shadow-lg">حاول مجدداً</button>
                </div>
            </div>
        </div>

        <!-- النقاط و التحكم -->
        <div class="flex justify-between w-full items-center">
            <div class="glass p-4 min-w-[120px] text-center">
                <p class="text-[10px] text-slate-400 uppercase font-black">النقاط</p>
                <p id="current-score" class="text-4xl font-black text-emerald-400">0</p>
            </div>

            <!-- أزرار التحكم للجوال -->
            <div class="grid grid-cols-3 gap-1 lg:hidden">
                <div class="col-start-2"><button onpointerdown="setDir(0, -1)" class="w-12 h-12 glass flex items-center justify-center active:bg-emerald-500/50"><i data-lucide="chevron-up"></i></button></div>
                <button onpointerdown="setDir(1, 0)" class="w-12 h-12 glass flex items-center justify-center active:bg-emerald-500/50"><i data-lucide="chevron-right"></i></button>
                <button onpointerdown="setDir(0, 1)" class="w-12 h-12 glass flex items-center justify-center active:bg-emerald-500/50"><i data-lucide="chevron-down"></i></button>
                <button onpointerdown="setDir(-1, 0)" class="w-12 h-12 glass flex items-center justify-center active:bg-emerald-500/50"><i data-lucide="chevron-left"></i></button>
            </div>
        </div>

        <!-- المهمات -->
        <div class="w-full glass p-4">
            <div class="flex justify-between items-center mb-2">
                <span class="text-xs font-bold text-slate-400">المهام النشطة</span>
                <i data-lucide="award" class="w-4 h-4 text-emerald-500"></i>
            </div>
            <div id="mission-list" class="space-y-2">
                <!-- المہمات تظهر هنا -->
            </div>
        </div>
    </div>

    <!-- المتجر -->
    <div id="shop" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-xl">
        <div class="w-full max-w-sm glass p-6 fade-in">
            <div class="flex justify-between mb-6 border-b border-white/10 pb-4">
                <h3 class="text-2xl font-black">متجر الألوان</h3>
                <button onclick="toggleShop()" class="text-slate-400"><i data-lucide="x"></i></button>
            </div>
            <div id="shop-items" class="space-y-3 max-h-[50vh] overflow-y-auto pr-2">
                <!-- ألوان المتجر -->
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const TILE_COUNT = 20;
        
        let state = {
            snake: [],
            food: {x: 5, y: 5},
            dx: 1, dy: 0,
            nextDx: 1, nextDy: 0,
            score: 0,
            speed: 130,
            gameActive: false,
            gems: parseInt(localStorage.getItem('snk_gems')) || 0,
            highScore: parseInt(localStorage.getItem('snk_hs')) || 0,
            activeColor: localStorage.getItem('snk_color') || '#22c55e',
            ownedColors: JSON.parse(localStorage.getItem('snk_owned')) || ['#22c55e'],
            loop: null
        };

        const SHOP_COLORS = [
            { name: 'أخضر غابة', color: '#22c55e', price: 0 },
            { name: 'أزرق محيطي', color: '#3b82f6', price: 50 },
            { name: 'أرجواني نيون', color: '#a855f7', price: 150 },
            { name: 'ورد صلب', color: '#f43f5e', price: 300 },
            { name: 'ذهب ملكي', color: '#fbbf24', price: 500 }
        ];

        window.onload = () => {
            initGame();
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').remove();
                    document.getElementById('main-ui').classList.remove('hidden');
                }, 500);
            }, 1000);
        };

        function initGame() {
            renderStats();
            renderMissions();
            lucide.createIcons();
            const size = 400; // حجم ثابت لسهولة الحساب
            canvas.width = size;
            canvas.height = size;
            drawPlaceholder();
        }

        function startGame() {
            state.gameActive = true;
            state.score = 0;
            state.speed = 130;
            state.dx = 1; state.dy = 0;
            state.nextDx = 1; state.nextDy = 0;
            state.snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
            
            document.getElementById('game-overlay').classList.add('hidden');
            document.getElementById('start-view').classList.add('hidden');
            document.getElementById('over-view').classList.add('hidden');
            
            updateScore();
            placeFood();
            
            clearTimeout(state.loop);
            gameLoop();
        }

        function gameLoop() {
            if(!state.gameActive) return;
            update();
            draw();
            state.loop = setTimeout(gameLoop, state.speed);
        }

        function update() {
            state.dx = state.nextDx;
            state.dy = state.nextDy;
            
            const head = { x: state.snake[0].x + state.dx, y: state.snake[0].y + state.dy };

            // تصادم الجدران
            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) return gameOver();
            
            // تصادم الجسم
            if (state.snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

            state.snake.unshift(head);

            // أكل الطعام
            if (head.x === state.food.x && head.y === state.food.y) {
                state.score += 10;
                state.gems += 2;
                state.speed = Math.max(60, state.speed - 1.5);
                updateScore();
                placeFood();
                renderMissions();
                save();
            } else {
                state.snake.pop();
            }
        }

        function draw() {
            const sz = canvas.width / TILE_COUNT;
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // طعام
            ctx.fillStyle = '#f43f5e';
            ctx.beginPath();
            ctx.arc(state.food.x * sz + sz/2, state.food.y * sz + sz/2, sz/2 - 4, 0, Math.PI * 2);
            ctx.fill();

            // ثعبان
            state.snake.forEach((s, i) => {
                ctx.fillStyle = i === 0 ? '#fff' : state.activeColor;
                ctx.beginPath();
                ctx.roundRect(s.x * sz + 1, s.y * sz + 1, sz - 2, sz - 2, 4);
                ctx.fill();
            });
        }

        function drawPlaceholder() {
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(0,0,canvas.width,canvas.height);
        }

        function gameOver() {
            state.gameActive = false;
            if(state.score > state.highScore) state.highScore = state.score;
            save();
            renderStats();
            document.getElementById('final-score').innerText = state.score;
            document.getElementById('game-overlay').classList.remove('hidden');
            document.getElementById('over-view').classList.remove('hidden');
        }

        function placeFood() {
            state.food = { x: Math.floor(Math.random() * TILE_COUNT), y: Math.floor(Math.random() * TILE_COUNT) };
            if (state.snake.some(s => s.x === state.food.x && s.y === state.food.y)) placeFood();
        }

        function updateScore() {
            document.getElementById('current-score').innerText = state.score;
            document.getElementById('gems-count').innerText = state.gems;
        }

        function renderStats() {
            document.getElementById('high-score').innerText = state.highScore;
            document.getElementById('gems-count').innerText = state.gems;
        }

        function setDir(x, y) {
            // منع الرجوع العكسي
            if (x !== 0 && state.dx === -x) return;
            if (y !== 0 && state.dy === -y) return;
            state.nextDx = x;
            state.nextDy = y;
        }

        function save() {
            localStorage.setItem('snk_hs', state.highScore);
            localStorage.setItem('snk_gems', state.gems);
            localStorage.setItem('snk_color', state.activeColor);
            localStorage.setItem('snk_owned', JSON.stringify(state.ownedColors));
        }

        function toggleShop() {
            const shop = document.getElementById('shop');
            shop.classList.toggle('hidden');
            if(!shop.classList.contains('hidden')) renderShop();
        }

        function renderShop() {
            const container = document.getElementById('shop-items');
            container.innerHTML = SHOP_COLORS.map(c => {
                const owned = state.ownedColors.includes(c.color);
                const active = state.activeColor === c.color;
                return `
                    <div class="glass p-3 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-md" style="background:${c.color}"></div>
                            <span class="text-sm font-bold">${c.name}</span>
                        </div>
                        <button onclick="${owned ? `selectColor('${c.color}')` : `buyColor('${c.color}', ${c.price})`}"
                                class="px-4 py-1.5 rounded-lg text-xs font-black ${active ? 'bg-emerald-500 text-slate-900' : 'bg-slate-700'}">
                            ${active ? 'نشط' : (owned ? 'اختيار' : c.price + ' 💎')}
                        </button>
                    </div>
                `;
            }).join('');
        }

        function buyColor(color, price) {
            if(state.gems >= price) {
                state.gems -= price;
                state.ownedColors.push(color);
                state.activeColor = color;
                save(); renderStats(); renderShop();
            } else alert('الجواهر غير كافية!');
        }

        function selectColor(color) {
            state.activeColor = color;
            save(); renderShop();
        }

        function renderMissions() {
            const m = [
                { t: 'الرقم القياسي 50+', ok: state.highScore >= 50 },
                { t: 'جمع 100 جوهرة', ok: state.gems >= 100 },
                { t: 'شراء لون جديد', ok: state.ownedColors.length > 1 }
            ];
            document.getElementById('mission-list').innerHTML = m.map(item => `
                <div class="flex items-center justify-between opacity-${item.ok ? '100' : '50'}">
                    <span class="text-[11px]">${item.t}</span>
                    <i data-lucide="${item.ok ? 'check-circle' : 'circle'}" class="w-3 h-3 ${item.ok ? 'text-emerald-500' : ''}"></i>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.onkeydown = (e) => {
            if(e.key === 'ArrowUp') setDir(0, -1);
            if(e.key === 'ArrowDown') setDir(0, 1);
            if(e.key === 'ArrowLeft') setDir(-1, 0);
            if(e.key === 'ArrowRight') setDir(1, 0);
            if(e.code === 'Space' && !state.gameActive) startGame();
        };

        // Polyfill for roundRect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                this.closePath(); return this;
            };
        }
    </script>
</body>
</html>
