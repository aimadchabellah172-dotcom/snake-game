<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE LUXE - تجربة الثعبان الفاخرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-sans: "Inter", sans-serif;
            --font-display: "Playfair Display", serif;
        }
        body {
            background-color: #000;
            color: #fff;
            font-family: var(--font-sans);
            overflow: hidden;
            margin: 0;
            user-select: none;
        }
        .gold-text {
            background: linear-gradient(to bottom right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glamour-shadow {
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
        }
        canvas {
            background: #050505;
            image-rendering: optimizeSpeed;
        }
        .shop-modal, .mission-modal {
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(30px);
        }
        @keyframes pulse-gold {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; transform: scale(1.05); }
        }
        .animate-pulse-gold {
            animation: pulse-gold 2s infinite ease-in-out;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .star-active { color: #fbbf24; fill: #fbbf24; }
        .star-inactive { color: #3f3f46; fill: none; }
        
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide { animation: slideIn 0.5s ease-out forwards; }
    </style>
</head>
<body>

    <!-- Main App Container -->
    <div id="app" class="relative h-screen w-screen flex flex-col items-center justify-center bg-[radial-gradient(circle_at_50%_50%,#1a1a1a_0%,#000_100%)]">
        
        <!-- Header Stats -->
        <div id="ui-top" class="fixed top-8 left-8 right-8 z-10 flex justify-between items-center opacity-0 transition-opacity duration-1000">
            <div class="flex items-center gap-10">
                <div class="flex flex-col">
                    <span class="text-[10px] uppercase tracking-[0.2em] text-zinc-500">أعلى نتيجة</span>
                    <span id="high-score-val" class="text-3xl font-display italic text-amber-500">0</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-[10px] uppercase tracking-[0.2em] text-zinc-500">العملات</span>
                    <span class="text-3xl font-display flex items-center gap-2">
                        <i data-lucide="coins" class="w-5 h-5 text-amber-400"></i>
                        <span id="coins-val">0</span>
                    </span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleMissionModal(true)" class="relative p-3 rounded-full border border-white/10 bg-white/5 hover:bg-white/10 transition-all">
                    <i data-lucide="scroll-text" class="w-5 h-5"></i>
                    <span id="mission-dot" class="hidden absolute top-0 right-0 w-3 h-3 bg-red-500 rounded-full border-2 border-black"></span>
                </button>
                <button onclick="toggleShop(true)" class="group flex items-center gap-3 px-6 py-3 rounded-full border border-white/10 bg-white/5 hover:bg-white/10 transition-all">
                    <i data-lucide="shopping-bag" class="w-4 h-4"></i>
                    <span class="text-sm font-medium">المتجر</span>
                </button>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="screen-start" class="flex flex-col items-center z-10">
            <h1 class="text-9xl font-display italic gold-text mb-2 tracking-tighter">SNAKE</h1>
            <p class="text-zinc-500 text-xs tracking-[0.5em] mb-12 uppercase">Luxury Edition</p>
            
            <button onclick="startGame()" class="group relative overflow-hidden px-16 py-6 border border-amber-500/30 rounded-full bg-transparent text-amber-500 hover:text-black transition-colors duration-500 mb-12">
                <div class="absolute inset-0 bg-amber-500 translate-x-[-101%] group-hover:translate-x-0 transition-transform duration-500"></div>
                <span class="relative z-10 text-xl font-medium tracking-[0.2em] flex items-center gap-3 uppercase">
                    ابدأ اللعب <i data-lucide="play" class="w-5 h-5 fill-current"></i>
                </span>
            </button>

            <!-- Rating Section -->
            <div class="flex flex-col items-center gap-3 p-6 bg-white/5 rounded-3xl border border-white/10 backdrop-blur-sm">
                <span class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">قيّم اللعبة</span>
                <div id="rating-stars" class="flex gap-2">
                    <!-- Stars injected via JS -->
                </div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="screen-game" class="hidden flex flex-col items-center z-10">
            <div class="mb-6 flex flex-col items-center">
                <span class="text-[10px] uppercase tracking-[0.2em] text-zinc-500 mb-1">النقاط الحالية</span>
                <span id="current-score-val" class="text-6xl font-display italic">0</span>
            </div>
            <div class="p-1 bg-gradient-to-tr from-white/10 to-white/5 rounded-2xl glamour-shadow transition-transform duration-300 transform" id="canvas-container">
                <canvas id="gameCanvas" width="400" height="400" class="rounded-xl"></canvas>
            </div>
            <p class="mt-8 text-zinc-600 text-[10px] tracking-widest uppercase animate-pulse">استخدم الأسهم للتحكم</p>
        </div>

        <!-- GameOver Screen -->
        <div id="screen-over" class="hidden flex flex-col items-center z-10 text-center">
            <h2 class="text-7xl font-display italic text-red-500 mb-8 tracking-tighter">GAME OVER</h2>
            <div class="bg-white/5 border border-white/10 p-10 rounded-[2.5rem] backdrop-blur-xl mb-10 min-w-[350px]">
                <div class="flex justify-between items-center mb-6 border-b border-white/5 pb-4">
                    <span class="text-zinc-500 uppercase text-[10px] tracking-widest">النتيجة</span>
                    <span id="final-score-val" class="text-5xl font-display italic">0</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-zinc-500 uppercase text-[10px] tracking-widest">العملات المكتسبة</span>
                    <span class="text-3xl font-display flex items-center gap-2 text-amber-500">
                        <i data-lucide="coins" class="w-6 h-6"></i>
                        <span id="earned-coins-val">+0</span>
                    </span>
                </div>
            </div>
            <button onclick="startGame()" class="flex items-center gap-4 px-14 py-6 bg-white text-black rounded-full font-bold hover:scale-105 transition-all text-xl">
                إعادة المحاولة <i data-lucide="rotate-ccw" class="w-6 h-6"></i>
            </button>
        </div>

        <!-- Shop Modal -->
        <div id="shop-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
            <div class="absolute inset-0 bg-black/90 backdrop-blur-md" onclick="toggleShop(false)"></div>
            <div class="relative w-full max-w-2xl bg-zinc-900 border border-white/10 rounded-[3rem] overflow-hidden shadow-2xl flex flex-col max-h-[85vh]">
                <div class="p-10 pb-6 flex justify-between items-center">
                    <div class="flex items-center gap-5">
                        <div class="w-14 h-14 rounded-2xl bg-amber-500/10 flex items-center justify-center text-amber-500">
                            <i data-lucide="shopping-bag" class="w-7 h-7"></i>
                        </div>
                        <h3 class="text-4xl font-display italic">المتجر</h3>
                    </div>
                    <button onclick="toggleShop(false)" class="p-2 hover:bg-white/10 rounded-full transition-colors">
                        <i data-lucide="x" class="w-7 h-7 text-zinc-500"></i>
                    </button>
                </div>

                <div class="px-10 flex gap-6 border-b border-white/5">
                    <button id="tab-skins" onclick="setTab('SKINS')" class="pb-4 text-sm font-bold border-b-2 border-amber-500 text-white">الأشكال الفاخرة</button>
                    <button id="tab-upgrades" onclick="setTab('UPGRADES')" class="pb-4 text-sm font-bold border-b-2 border-transparent text-zinc-500 hover:text-white">التطويرات</button>
                </div>

                <div id="shop-content" class="flex-1 overflow-y-auto p-10 pt-8 hide-scrollbar">
                </div>
            </div>
        </div>

        <!-- Missions Modal -->
        <div id="mission-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
            <div class="absolute inset-0 bg-black/90 backdrop-blur-md" onclick="toggleMissionModal(false)"></div>
            <div class="relative w-full max-w-lg bg-zinc-900 border border-white/10 rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col">
                <div class="p-8 pb-4 flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <i data-lucide="scroll-text" class="w-6 h-6 text-amber-500"></i>
                        <h3 class="text-3xl font-display italic">المهمات اليومية</h3>
                    </div>
                    <button onclick="toggleMissionModal(false)" class="p-2 hover:bg-white/10 rounded-full transition-colors">
                        <i data-lucide="x" class="w-6 h-6 text-zinc-500"></i>
                    </button>
                </div>
                <div id="mission-content" class="p-8 space-y-4">
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- Game Config & State ---
        const GRID_SIZE = 20;
        const INITIAL_SPEED = 150;
        const SPEED_INCREMENT = 1.8;
        const MIN_SPEED = 50;

        let canvas, ctx;
        let snake = [];
        let food = {x: 5, y: 5};
        let direction = 'UP';
        let nextDirection = 'UP';
        let gameActive = false;
        let score = 0;
        let gameLoop;
        let totalFoodEatenThisSession = 0;

        // Persistent Data
        let data = {
            highScore: 0,
            coins: 0,
            ownedSkins: ['default'],
            currentSkin: 'default',
            upgrades: { magnet: 0, speed: 0, double: 0 },
            rating: 0,
            lastMissionDate: null,
            missions: []
        };

        const SKINS = [
            { id: 'default', name: 'الكلاسيكي', color: '#10b981', price: 0, type: 'rounded' },
            { id: 'diamond', name: 'الماس اللامع', color: '#0ea5e9', price: 600, type: 'diamond', pulse: true },
            { id: 'gold', name: 'الذهب الملكي', color: '#fbbf24', price: 800, grad: ['#BF953F', '#FCF6BA', '#B38728'], type: 'rounded' },
            { id: 'cyber', name: 'السايبر الرقمي', color: '#ec4899', price: 500, type: 'glitch', pulse: true },
            { id: 'ruby', name: 'الياقوت المشع', color: '#ef4444', price: 1200, type: 'circle', animated: true },
            { id: 'phantom', name: 'الشبح المظلم', color: '#444', price: 1500, type: 'ghost', animated: true },
        ];

        const UPGRADES = [
            { id: 'magnet', name: 'المغناطيس', desc: 'جذب الطعام تلقائياً', price: 500, max: 3, icon: 'sparkles' },
            { id: 'speed', name: 'خفة الحركة', desc: 'توازن السرعة القصوى', price: 400, max: 5, icon: 'zap' },
            { id: 'double', name: 'المضاعف المطلق', desc: 'أرباح مضاعفة لكل وجبة', price: 2000, max: 1, icon: 'trending-up' },
        ];

        // --- Initialization ---
        window.onload = () => {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            loadData();
            checkDailyMissions();
            updateUI();
            renderRatingStars();
            lucide.createIcons();
            document.getElementById('ui-top').style.opacity = '1';
        };

        function loadData() {
            const saved = localStorage.getItem('snake_luxe_v2_storage');
            if (saved) data = Object.assign(data, JSON.parse(saved));
        }

        function saveData() {
            localStorage.setItem('snake_luxe_v2_storage', JSON.stringify(data));
            updateUI();
        }

        function updateUI() {
            document.getElementById('high-score-val').innerText = data.highScore;
            document.getElementById('coins-val').innerText = Math.floor(data.coins);
            
            const hasRewards = data.missions.some(m => m.completed && !m.claimed);
            document.getElementById('mission-dot').classList.toggle('hidden', !hasRewards);
        }

        // --- Daily Missions Logic ---
        function checkDailyMissions() {
            const now = new Date();
            const todayStr = now.toDateString();
            
            if (data.lastMissionDate !== todayStr) {
                const missionPool = [
                    { id: 1, text: 'تناول 30 قطعة طعام', target: 30, field: 'foodEaten', prize: 100 },
                    { id: 2, text: 'سجل 20 نقطة في جولة واحدة', target: 20, field: 'oneGameScore', prize: 150 },
                    { id: 3, text: 'العب 5 جولات كاملة', target: 5, field: 'gamesPlayed', prize: 50 },
                    { id: 4, text: 'تخطى حاجز 50 نقطة', target: 50, field: 'oneGameScore', prize: 500 },
                    { id: 5, text: 'تناول 100 قطعة إجمالية', target: 100, field: 'foodEaten', prize: 300 }
                ];
                
                // Pick 3 random
                const shuffled = missionPool.sort(() => 0.5 - Math.random());
                data.missions = shuffled.slice(0, 3).map(m => ({
                    ...m, progress: 0, completed: false, claimed: false
                }));
                data.lastMissionDate = todayStr;
                saveData();
            }
        }

        function trackProgress(field, value, isIncremental = true) {
            data.missions.forEach(m => {
                if (m.field === field && !m.completed) {
                    if (isIncremental) m.progress += value;
                    else m.progress = Math.max(m.progress, value);
                    
                    if (m.progress >= m.target) {
                        m.progress = m.target;
                        m.completed = true;
                    }
                }
            });
            saveData();
        }

        function toggleMissionModal(show) {
            document.getElementById('mission-modal').classList.toggle('hidden', !show);
            if (show) {
                const container = document.getElementById('mission-content');
                container.innerHTML = '';
                data.missions.forEach(m => {
                    const card = `
                        <div class="p-6 rounded-3xl border ${m.completed ? 'border-emerald-500/30 bg-emerald-500/5' : 'border-white/5 bg-white/5'} transition-all">
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-sm font-medium ${m.completed ? 'text-emerald-500' : 'text-zinc-300'}">${m.text}</span>
                                <span class="text-xs font-mono text-zinc-500">${m.progress}/${m.target}</span>
                            </div>
                            <div class="h-1.5 w-full bg-white/10 rounded-full overflow-hidden mb-4">
                                <div class="h-full bg-amber-500 transition-all duration-1000" style="width: ${(m.progress/m.target)*100}%"></div>
                            </div>
                            <div class="flex justify-between items-center">
                                <div class="flex items-center gap-2 text-amber-500 font-bold text-sm">
                                    <i data-lucide="coins" class="w-3 h-3"></i>
                                    +${m.prize}
                                </div>
                                ${m.completed && !m.claimed ? 
                                    `<button onclick="claimMission(${m.id})" class="px-4 py-1.5 bg-emerald-500 text-black text-[10px] font-black rounded-full uppercase">استلام</button>` : 
                                    (m.claimed ? `<span class="text-[10px] text-emerald-500 uppercase font-bold tracking-widest">تم الاستلام</span>` : `<span class="text-[10px] text-zinc-600 uppercase font-bold tracking-widest">انتظار</span>`)}
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
                lucide.createIcons();
            }
        }

        function claimMission(id) {
            const m = data.missions.find(m => m.id === id);
            if (m && m.completed && !m.claimed) {
                m.claimed = true;
                data.coins += m.prize;
                saveData();
                toggleMissionModal(true);
            }
        }

        // --- Rating Logic ---
        function renderRatingStars() {
            const container = document.getElementById('rating-stars');
            container.innerHTML = '';
            for (let i = 1; i <= 5; i++) {
                const isSelected = i <= data.rating;
                const star = document.createElement('i');
                star.setAttribute('data-lucide', 'star');
                star.className = `w-6 h-6 cursor-pointer transition-all hover:scale-125 ${isSelected ? 'star-active' : 'star-inactive'}`;
                star.onclick = () => rateApp(i);
                container.appendChild(star);
            }
            lucide.createIcons();
        }

        function rateApp(stars) {
            data.rating = stars;
            saveData();
            renderRatingStars();
        }

        // --- Game Logic ---
        function startGame() {
            hideAllScreens();
            document.getElementById('screen-game').classList.remove('hidden');
            score = 0;
            totalFoodEatenThisSession = 0;
            updateScoreUI();
            snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
            direction = 'UP';
            nextDirection = 'UP';
            placeFood();
            gameActive = true;
            if (gameLoop) clearTimeout(gameLoop);
            runLoop();
        }

        function runLoop() {
            const speed = Math.max(MIN_SPEED, INITIAL_SPEED - (score * (SPEED_INCREMENT / (1 + data.upgrades.speed * 0.4))));
            gameLoop = setTimeout(() => {
                if (!gameActive) return;
                update();
                draw();
                runLoop();
            }, speed);
        }

        function update() {
            direction = nextDirection;
            const head = {...snake[0]};

            if (direction === 'UP') head.y--;
            if (direction === 'DOWN') head.y++;
            if (direction === 'LEFT') head.x--;
            if (direction === 'RIGHT') head.x++;

            // Wall Collision
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) return gameOver();
            // Self Collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

            snake.unshift(head);

            // Magnet Upgrade
            if (data.upgrades.magnet > 0) {
                const d = Math.hypot(head.x - food.x, head.y - food.y);
                if (d <= data.upgrades.magnet * 1.5 && d > 0) {
                    if (food.x < head.x) food.x++; else if (food.x > head.x) food.x--;
                    if (food.y < head.y) food.y++; else if (food.y > head.y) food.y--;
                }
            }

            if (head.x === food.x && head.y === food.y) {
                score++;
                totalFoodEatenThisSession++;
                updateScoreUI();
                placeFood();
                // Visual feedback for eating
                document.getElementById('canvas-container').classList.add('scale-105');
                setTimeout(() => document.getElementById('canvas-container').classList.remove('scale-105'), 100);
            } else {
                snake.pop();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const size = canvas.width / GRID_SIZE;

            // Subtle Grid
            ctx.strokeStyle = 'rgba(255,255,255,0.02)';
            ctx.lineWidth = 0.5;
            for(let i=1; i<GRID_SIZE; i++) {
                ctx.beginPath(); ctx.moveTo(i*size,0); ctx.lineTo(i*size,canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i*size); ctx.lineTo(canvas.width,i*size); ctx.stroke();
            }

            // Food
            const foodPulse = 3 + Math.sin(Date.now() / 150) * 2;
            ctx.fillStyle = '#F59E0B';
            ctx.shadowBlur = 10 + foodPulse * 2;
            ctx.shadowColor = '#F59E0B';
            ctx.beginPath();
            ctx.arc(food.x*size + size/2, food.y*size + size/2, (size/4) + (foodPulse/10), 0, Math.PI*2);
            ctx.fill();

            // Snake
            const skin = SKINS.find(s => s.id === data.currentSkin);
            snake.forEach((seg, i) => {
                const isHead = i === 0;
                
                ctx.save();
                ctx.translate(seg.x*size + size/2, seg.y*size + size/2);

                if (skin.animated) {
                    ctx.fillStyle = `hsl(${(Date.now()/10 + i*15)%360}, 75%, 60%)`;
                } else if (skin.grad) {
                    const g = ctx.createLinearGradient(-size/2, -size/2, size/2, size/2);
                    g.addColorStop(0, skin.grad[0]); g.addColorStop(0.5, skin.grad[1]); g.addColorStop(1, skin.grad[2]);
                    ctx.fillStyle = g;
                } else if (skin.type === 'glitch') {
                    ctx.fillStyle = (Date.now() % 200 < 50) ? '#fff' : skin.color;
                } else {
                    ctx.fillStyle = skin.color;
                }
                
                ctx.shadowBlur = isHead ? 25 : 5;
                ctx.shadowColor = skin.color;
                
                const rad = isHead ? size/2 - 1 : size/2 - 2;

                // Shape handling
                if (skin.type === 'diamond') {
                    ctx.rotate(Math.PI / 4);
                    const s = rad * 0.9;
                    ctx.fillRect(-s, -s, s*2, s*2);
                } else if (skin.type === 'circle') {
                    ctx.beginPath(); ctx.arc(0, 0, rad, 0, Math.PI*2); ctx.fill();
                } else if (skin.type === 'glitch' && !isHead) {
                    ctx.fillRect(-rad, -rad, rad*2, rad*2);
                } else if (skin.type === 'ghost') {
                    ctx.globalAlpha = 0.5 + Math.sin(Date.now()/300)*0.3;
                    roundRect(ctx, -rad, -rad, rad*2, rad*2, 4);
                    ctx.fill();
                } else {
                    roundRect(ctx, -rad, -rad, rad*2, rad*2, isHead ? 8 : 4);
                    ctx.fill();
                }

                if (isHead) {
                    ctx.fillStyle = '#000';
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.arc(-rad/3, -rad/3, 2, 0, Math.PI*2);
                    ctx.arc(rad/3, -rad/3, 2, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.restore();
            });
        }

        function gameOver() {
            gameActive = false;
            hideAllScreens();
            document.getElementById('screen-over').classList.remove('hidden');
            document.getElementById('final-score-val').innerText = score;
            
            const earned = Math.floor(score / 2) * (data.upgrades.double ? 2 : 1);
            document.getElementById('earned-coins-val').innerText = '+' + earned;
            
            data.coins += earned;
            if (score > data.highScore) data.highScore = score;

            // Track Missions
            trackProgress('foodEaten', totalFoodEatenThisSession);
            trackProgress('oneGameScore', score, false);
            trackProgress('gamesPlayed', 1);

            saveData();
        }

        function placeFood() {
            food = {
                x: Math.floor(Math.random() * GRID_SIZE),
                y: Math.floor(Math.random() * GRID_SIZE)
            };
            if (snake.some(s => s.x === food.x && s.y === food.y)) placeFood();
        }

        function updateScoreUI() {
            document.getElementById('current-score-val').innerText = score;
        }

        // --- Helpers ---
        function hideAllScreens() {
            ['screen-start', 'screen-game', 'screen-over'].forEach(s => document.getElementById(s).classList.add('hidden'));
        }

        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y); 
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius); 
            ctx.lineTo(x + width, y + height - radius); 
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); 
            ctx.lineTo(x + radius, y + height); 
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius); 
            ctx.lineTo(x, y + radius); 
            ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath();
        }

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' && direction !== 'DOWN') nextDirection = 'UP';
            if (e.key === 'ArrowDown' && direction !== 'UP') nextDirection = 'DOWN';
            if (e.key === 'ArrowLeft' && direction !== 'RIGHT') nextDirection = 'LEFT';
            if (e.key === 'ArrowRight' && direction !== 'LEFT') nextDirection = 'RIGHT';
        });

        // --- Shop Logic ---
        let currentTab = 'SKINS';
        function toggleShop(show) {
            document.getElementById('shop-modal').classList.toggle('hidden', !show);
            if (show) setTab(currentTab);
        }

        function setTab(tab) {
            currentTab = tab;
            document.getElementById('tab-skins').className = `pb-4 text-[10px] uppercase tracking-widest font-bold border-b-2 ${tab==='SKINS'?'border-amber-500 text-white':'border-transparent text-zinc-500'}`;
            document.getElementById('tab-upgrades').className = `pb-4 text-[10px] uppercase tracking-widest font-bold border-b-2 ${tab==='UPGRADES'?'border-amber-500 text-white':'border-transparent text-zinc-500'}`;
            renderShop();
        }

        function renderShop() {
            const container = document.getElementById('shop-content');
            container.innerHTML = '';

            if (currentTab === 'SKINS') {
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-2 gap-8';
                SKINS.forEach(skin => {
                    const isOwned = data.ownedSkins.includes(skin.id);
                    const isActive = data.currentSkin === skin.id;
                    const card = `
                        <div class="group p-8 rounded-[2.5rem] border ${isActive?'border-amber-500 bg-amber-500/5':'border-white/5 bg-white/5'} transition-all flex flex-col items-center text-center">
                            <div class="relative w-20 h-20 mb-6 flex items-center justify-center">
                                <div class="absolute inset-0 bg-white/5 rounded-3xl group-hover:scale-110 transition-transform"></div>
                                <div class="w-12 h-12 rounded-xl shadow-lg z-10 ${skin.pulse?'animate-pulse-gold':''}" 
                                     style="background: ${skin.grad?`linear-gradient(45deg,${skin.grad[0]},${skin.grad[2]})`:skin.color}; 
                                            transform: ${skin.type==='diamond'?'rotate(45deg)':'none'};
                                            border-radius: ${skin.type==='rounded'?'12px':(skin.type==='circle'?'50%':'4px')};
                                            box-shadow: 0 0 20px ${skin.color}44">
                                </div>
                            </div>
                            <h4 class="text-xl font-display italic mb-2">${skin.name}</h4>
                            <span class="text-[10px] uppercase tracking-widest text-zinc-500 mb-6">${isOwned ? 'ممتلك' : skin.price + ' ذهب'}</span>
                            <button onclick="${isOwned ? `selectSkin('${skin.id}')` : `buySkin('${skin.id}',${skin.price})`}" 
                                class="w-full py-4 rounded-2xl text-[10px] uppercase tracking-widest font-black transition-all ${isActive?'bg-amber-500 text-black':(isOwned?'bg-white/10 text-white':'bg-white text-black active:scale-95')}"
                                ${isActive ? 'disabled' : ''}>
                                ${isActive ? 'نشط الآن' : (isOwned ? 'تفعيل' : 'شراء')}
                            </button>
                        </div>`;
                    grid.innerHTML += card;
                });
                container.appendChild(grid);
            } else {
                const list = document.createElement('div');
                list.className = 'space-y-4';
                UPGRADES.forEach(up => {
                    const level = data.upgrades[up.id] || 0;
                    const isMax = level >= up.max;
                    list.innerHTML += `
                        <div class="p-8 rounded-[2.5rem] bg-white/5 border border-white/5 flex items-center justify-between hover:bg-white/10 transition-all">
                            <div class="flex items-center gap-8">
                                <div class="w-16 h-16 rounded-3xl bg-zinc-800 flex items-center justify-center text-zinc-400">
                                    <i data-lucide="${up.icon}" class="w-8 h-8"></i>
                                </div>
                                <div>
                                    <h4 class="text-2xl font-display italic">${up.name}</h4>
                                    <p class="text-[10px] text-zinc-500 font-mono uppercase tracking-tight">${up.desc}</p>
                                    <div class="flex gap-1.5 mt-4">
                                        ${Array.from({length:up.max}).map((_,i) => `<div class="h-1.5 w-8 rounded-full ${i<level?'bg-amber-500':'bg-white/10'}"></div>`).join('')}
                                    </div>
                                </div>
                            </div>
                            <button onclick="${isMax ? '' : `buyUpgrade('${up.id}',${up.price})`}" 
                                class="flex items-center gap-3 px-8 py-4 rounded-full font-black text-xs ${isMax ? 'bg-zinc-800 text-zinc-500 cursor-not-allowed' : 'bg-white text-black hover:scale-105 active:scale-95 transition-all'}"
                                ${isMax ? 'disabled' : ''}>
                                ${isMax ? 'المستوى الأقصى' : `<span class="font-mono">${up.price}</span> <i data-lucide="coins" class="w-4 h-4"></i>`}
                            </button>
                        </div>`;
                });
                container.appendChild(list);
            }
            lucide.createIcons();
        }

        function buySkin(id, price) {
            if (data.coins >= price) {
                data.coins -= price;
                data.ownedSkins.push(id);
                saveData();
                renderShop();
            }
        }

        function selectSkin(id) {
            data.currentSkin = id;
            saveData();
            renderShop();
        }

        function buyUpgrade(id, price) {
            if (data.coins >= price) {
                data.coins -= price;
                data.upgrades[id]++;
                saveData();
                renderShop();
            }
        }
    </script>
</body>
</html>
