<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE LUXE - Legendary Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-sans: "Inter", sans-serif;
            --font-display: "Playfair Display", serif;
            --primary: #BF953F;
        }
        body {
            background-color: #000;
            color: #fff;
            font-family: var(--font-sans);
            overflow: hidden;
            margin: 0;
            user-select: none;
        }
        .gold-text {
            background: linear-gradient(to bottom right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .luxury-shadow {
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(191, 149, 63, 0.2);
        }
        canvas {
            background: transparent;
            image-rendering: auto;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }
        .animate-float { animation: float 6s infinite ease-in-out; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .mission-card:hover { transform: translateY(-5px); border-color: rgba(191, 149, 63, 0.5); }
        
        /* Background overlays */
        #bg-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            transition: all 1.5s ease-in-out;
        }

        .star-active { color: #fbbf24; fill: #fbbf24; }
        .star-inactive { color: #27272a; fill: none; }
        
        @keyframes slideIn {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide { animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body>

    <div id="bg-overlay" class="bg-[#020202]"></div>

    <div id="app" class="relative h-screen w-screen flex flex-col items-center justify-center overflow-hidden">
        
        <!-- Header HUD -->
        <div id="hud" class="fixed top-8 left-8 right-8 z-20 flex justify-between items-start opacity-0 transition-all duration-1000 transform -translate-y-4">
            <div class="flex items-center gap-12">
                <div class="flex flex-col">
                    <span class="text-[9px] uppercase tracking-[0.3em] text-zinc-500 font-black mb-1">الرقم القياسي</span>
                    <span id="high-score-val" class="text-4xl font-display italic gold-text font-black">0</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-[9px] uppercase tracking-[0.3em] text-zinc-500 font-black mb-1">الثروة</span>
                    <span class="text-4xl font-display flex items-center gap-2">
                        <i data-lucide="gem" class="w-6 h-6 text-blue-400"></i>
                        <span id="coins-val">0</span>
                    </span>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="toggleMissionModal(true)" class="relative p-4 rounded-2xl glass hover:bg-white/10 transition-all group">
                    <i data-lucide="crown" class="w-6 h-6 text-amber-500 group-hover:scale-110 transition-transform"></i>
                    <span id="mission-dot" class="hidden absolute top-2 right-2 w-3 h-3 bg-red-500 rounded-full border-2 border-black animate-pulse"></span>
                </button>
                <button onclick="toggleShop(true)" class="group flex items-center gap-4 px-8 py-4 rounded-2xl glass hover:bg-white/10 transition-all active:scale-95">
                    <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                    <span class="text-xs uppercase tracking-widest font-black leading-none">العرض الفاخر</span>
                </button>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="screen-start" class="flex flex-col items-center z-10 animate-slide">
            <div class="relative group cursor-pointer mb-8">
                <div class="absolute -inset-8 bg-amber-500/10 blur-[100px] opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <h1 class="text-[12rem] font-display italic gold-text leading-none tracking-tighter animate-float drop-shadow-2xl">LUXE</h1>
                <p class="absolute bottom-4 right-0 text-zinc-500 text-xs tracking-[1em] uppercase font-light">Snake Legend</p>
            </div>
            
            <button onclick="startGame()" class="group relative px-20 py-8 rounded-[2rem] border border-white/5 bg-white/5 overflow-hidden transition-all hover:border-amber-500/50">
                <div class="absolute inset-0 bg-gradient-to-r from-amber-500/20 via-transparent to-amber-500/20 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-1000"></div>
                <span class="relative z-10 text-2xl font-display italic tracking-[0.2em] flex items-center gap-4 uppercase font-black text-amber-500 group-hover:text-white transition-colors">
                    دخول اللعب <i data-lucide="chevron-left" class="w-6 h-6"></i>
                </span>
            </button>

            <div class="mt-16 flex flex-col items-center gap-4 py-8 px-12 glass rounded-[3rem]">
                <span class="text-[10px] uppercase tracking-[0.4em] text-zinc-500 font-black">تجربة المستخدم</span>
                <div id="rating-stars" class="flex gap-3"></div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="screen-game" class="hidden flex flex-col items-center z-10">
            <div class="mb-10 text-center">
                <span class="text-[10px] uppercase tracking-[0.5em] text-zinc-500 font-black">النتيجة الحالية</span>
                <div id="current-score-val" class="text-8xl font-display italic gold-text mt-2 font-black">0</div>
            </div>
            
            <div class="relative p-2 rounded-[3.5rem] bg-gradient-to-tr from-white/10 to-transparent luxury-shadow" id="canvas-container">
                <div class="absolute -inset-4 bg-gradient-to-br from-amber-500/10 to-blue-500/10 blur-2xl opacity-50"></div>
                <canvas id="gameCanvas" width="500" height="500" class="relative rounded-[3rem] glass"></canvas>
            </div>
            
            <div class="mt-12 flex gap-10 opacity-30">
                <div class="flex items-center gap-2"><i data-lucide="move" class="w-4 h-4"></i> <span class="text-[9px] uppercase tracking-widest font-bold">الأسهم للتحكم</span></div>
                <div class="flex items-center gap-2"><i data-lucide="zap" class="w-4 h-4"></i> <span class="text-[9px] uppercase tracking-widest font-bold">أداء فائق</span></div>
            </div>
        </div>

        <!-- GameOver Screen -->
        <div id="screen-over" class="hidden flex flex-col items-center z-10 text-center">
            <h2 class="text-9xl font-display italic text-red-500 mb-12 drop-shadow-[0_0_30px_rgba(239,68,68,0.3)]">FINISH.</h2>
            <div class="glass p-16 rounded-[4rem] mb-12 min-w-[450px]">
                <div class="flex justify-between items-center mb-10">
                    <span class="text-zinc-500 uppercase text-[10px] tracking-[0.4em] font-black">النقاط النهائية</span>
                    <span id="final-score-val" class="text-7xl font-display italic">0</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-zinc-500 uppercase text-[10px] tracking-[0.4em] font-black">أرباح الجولة</span>
                    <span class="text-4xl font-display flex items-center gap-3 text-amber-500">
                        <i data-lucide="gem" class="w-8 h-8"></i>
                        <span id="earned-coins-val">0</span>
                    </span>
                </div>
            </div>
            <button onclick="startGame()" class="flex items-center gap-6 px-16 py-8 bg-white text-black rounded-full font-black hover:scale-105 transition-all text-2xl active:scale-95 luxury-shadow">
                إعادة المحاولة <i data-lucide="rotate-ccw" class="w-7 h-7"></i>
            </button>
        </div>

        <!-- Shop Modal -->
        <div id="shop-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
            <div class="absolute inset-0 bg-black/95 backdrop-blur-3xl" onclick="toggleShop(false)"></div>
            <div class="relative w-full max-w-4xl bg-zinc-950 border border-white/5 rounded-[4rem] overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                <div class="p-12 pb-8 flex justify-between items-center">
                    <div class="flex items-center gap-6">
                        <div class="w-16 h-16 rounded-3xl bg-amber-500/10 flex items-center justify-center text-amber-500">
                            <i data-lucide="shopping-bag" class="w-8 h-8"></i>
                        </div>
                        <h3 class="text-5xl font-display italic">المعرض الفاخر</h3>
                    </div>
                    <button onclick="toggleShop(false)" class="p-3 hover:bg-white/5 rounded-full transition-colors active:scale-90">
                        <i data-lucide="x" class="w-8 h-8 text-zinc-600"></i>
                    </button>
                </div>

                <div class="px-12 flex gap-10 border-b border-white/5">
                    <button id="tab-skins" onclick="setTab('SKINS')" class="pb-6 text-xs uppercase tracking-[0.3em] font-black border-b-2 transition-all">الأشكال الأسطورية</button>
                    <button id="tab-backgrounds" onclick="setTab('BACKGROUNDS')" class="pb-6 text-xs uppercase tracking-[0.3em] font-black border-b-2 transition-all">البيئة المحيطة</button>
                    <button id="tab-upgrades" onclick="setTab('UPGRADES')" class="pb-6 text-xs uppercase tracking-[0.3em] font-black border-b-2 transition-all">القدرات الخاصة</button>
                </div>

                <div id="shop-content" class="flex-1 overflow-y-auto p-12 hide-scrollbar"></div>
            </div>
        </div>

        <!-- Missions Modal -->
        <div id="mission-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
            <div class="absolute inset-0 bg-black/95 backdrop-blur-3xl" onclick="toggleMissionModal(false)"></div>
            <div class="relative w-full max-w-2xl bg-zinc-950 border border-white/5 rounded-[3.5rem] overflow-hidden shadow-2xl flex flex-col">
                <div class="p-12 pb-6 flex justify-between items-center">
                    <div class="flex items-center gap-5">
                        <i data-lucide="crown" class="w-8 h-8 text-amber-500"></i>
                        <h3 class="text-4xl font-display italic">الإنجازات اليومية</h3>
                    </div>
                    <button onclick="toggleMissionModal(false)" class="p-3 hover:bg-white/5 rounded-full transition-colors">
                        <i data-lucide="x" class="w-8 h-8 text-zinc-600"></i>
                    </button>
                </div>
                <div id="mission-content" class="p-12 space-y-6 pt-6"></div>
            </div>
        </div>

    </div>

    <script>
        // --- Constants ---
        const GRID_SIZE = 25;
        const INITIAL_SPEED = 140;
        const SPEED_INCREMENT = 1.5;
        const MIN_SPEED = 40;

        let canvas, ctx;
        let snake = [];
        let food = {x: 10, y: 10};
        let particles = [];
        let direction = 'UP';
        let nextDirection = 'UP';
        let gameActive = false;
        let score = 0;
        let gameTime = 0;
        let lastTime = 0;
        let speed = INITIAL_SPEED;

        // --- Persistent Data ---
        let data = {
            highScore: 0,
            coins: 0,
            ownedSkins: ['default'],
            currentSkin: 'default',
            ownedBackgrounds: ['default'],
            currentBackground: 'default',
            upgrades: { magnet: 0, speed: 0, ghost: 0, multi: 0 },
            rating: 0,
            lastMissionDate: null,
            missions: []
        };

        const SKINS = [
            { id: 'default', name: 'السيليكون الكلاسيكي', color: '#10b981', price: 0, type: 'rounded' },
            { id: 'ruby', name: 'الياقوت المشتعل', color: '#ef4444', price: 500, animated: true, type: 'circle' },
            { id: 'gold', name: 'السيادة الذهبية', color: '#fbbf24', price: 1500, grad: ['#BF953F', '#FCF6BA', '#B38728'], type: 'diamond' },
            { id: 'cyber', name: 'سايبر بانك 2077', color: '#ec4899', price: 2500, type: 'glitch', particles: '#ec4899' },
            { id: 'matrix', name: 'نظام المصفوفة', color: '#22c55e', price: 4000, type: 'ghost', animated: true },
            { id: 'cosmic', name: 'الغبار الكوني', color: '#8b5cf6', price: 7500, grad: ['#4c1d95', '#8b5cf6', '#d8b4fe'], type: 'circle', particles: '#fff' }
        ];

        const BACKGROUNDS = [
            { id: 'default', name: 'الفراغ الأسود', color: '#020202', price: 0, overlay: 'none' },
            { id: 'royal', name: 'القاعة الملكية', color: '#1a0d0d', price: 1500, gradient: 'radial-gradient(circle, #2d1b1b, #000)' },
            { id: 'nebula', name: 'سديم النجوم', color: '#09081a', price: 3000, gradient: 'linear-gradient(135deg, #09081a 0%, #151133 100%)' },
            { id: 'cyber', name: 'الشبكة الرقمية', color: '#000', price: 5000, grid: true }
        ];

        const UPGRADES = [
            { id: 'magnet', name: 'المغناطيس النووي', desc: 'جذب الطعام من مسافة هائلة', price: 1200, max: 4, icon: 'maximize' },
            { id: 'speed', name: 'مثبت السرعة', desc: 'يمنع تسارع اللعبة المزعج', price: 800, max: 8, icon: 'activity' },
            { id: 'ghost', name: 'الطور الشبحي', desc: 'احتمالية المرور من الجدران', price: 4000, max: 3, icon: 'ghost' },
            { id: 'multi', name: 'مضاعف الثروة X3', desc: 'كل قطعة تساوي ثروة', price: 7000, max: 1, icon: 'trending-up' }
        ];

        window.onload = () => {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            loadData();
            checkDailyMissions();
            updateUI();
            applyBackground();
            renderRatingStars();
            lucide.createIcons();
            document.getElementById('hud').style.opacity = '1';
            document.getElementById('hud').style.transform = 'translateY(0)';
        };

        function loadData() {
            const saved = localStorage.getItem('snake_legend_v3');
            if (saved) {
                const parsed = JSON.parse(saved);
                data = Object.assign(data, parsed);
                // Ensure array fields exist
                if (!Array.isArray(data.ownedSkins)) data.ownedSkins = ['default'];
                if (!Array.isArray(data.ownedBackgrounds)) data.ownedBackgrounds = ['default'];
            }
        }

        function saveData() {
            localStorage.setItem('snake_legend_v3', JSON.stringify(data));
            updateUI();
        }

        function updateUI() {
            document.getElementById('high-score-val').innerText = data.highScore;
            document.getElementById('coins-val').innerText = Math.floor(data.coins);
            const hasRewards = data.missions.some(m => m.completed && !m.claimed);
            document.getElementById('mission-dot').classList.toggle('hidden', !hasRewards);
        }

        function applyBackground() {
            const bg = BACKGROUNDS.find(b => b.id === data.currentBackground) || BACKGROUNDS[0];
            const overlay = document.getElementById('bg-overlay');
            overlay.style.background = bg.gradient || bg.color;
            if (bg.grid) {
                overlay.style.backgroundImage = 'radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0)';
                overlay.style.backgroundSize = '40px 40px';
            } else {
                overlay.style.backgroundImage = 'none';
            }
        }

        // --- Game System ---
        function startGame() {
            hideAllScreens();
            document.getElementById('screen-game').classList.remove('hidden');
            score = 0;
            gameTime = 0;
            speed = INITIAL_SPEED;
            snake = [{x: 12, y: 12}, {x: 12, y: 13}, {x: 12, y: 14}];
            direction = 'UP';
            nextDirection = 'UP';
            placeFood();
            particles = [];
            gameActive = true;
            lastTime = performance.now();
            requestAnimationFrame(gameLoopUpdate);
        }

        function gameLoopUpdate(time) {
            if (!gameActive) return;
            
            const delta = time - lastTime;
            gameTime += delta;
            
            const targetSpeed = Math.max(MIN_SPEED, INITIAL_SPEED - (score * (SPEED_INCREMENT / (1 + data.upgrades.speed * 0.4))));
            
            if (gameTime >= targetSpeed) {
                update();
                gameTime = 0;
            }
            
            draw();
            lastTime = time;
            requestAnimationFrame(gameLoopUpdate);
        }

        function update() {
            direction = nextDirection;
            const head = {...snake[0]};

            if (direction === 'UP') head.y--;
            if (direction === 'DOWN') head.y++;
            if (direction === 'LEFT') head.x--;
            if (direction === 'RIGHT') head.x++;

            // Ghost Mode / Wall handling
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                if (data.upgrades.ghost > 0 && Math.random() < (data.upgrades.ghost * 0.2)) {
                    if (head.x < 0) head.x = GRID_SIZE - 1;
                    else if (head.x >= GRID_SIZE) head.x = 0;
                    else if (head.y < 0) head.y = GRID_SIZE - 1;
                    else if (head.y >= GRID_SIZE) head.y = 0;
                } else {
                    return gameOver();
                }
            }

            if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

            snake.unshift(head);

            // Magnet
            if (data.upgrades.magnet > 0) {
                const dist = Math.hypot(head.x - food.x, head.y - food.y);
                if (dist <= data.upgrades.magnet * 2.5) {
                    if (food.x < head.x) food.x++; else if (food.x > head.x) food.x--;
                    if (food.y < head.y) food.y++; else if (food.y > head.y) food.y--;
                }
            }

            if (head.x === food.x && head.y === food.y) {
                score++;
                spawnParticles(food.x, food.y);
                placeFood();
                document.getElementById('current-score-val').innerText = score;
            } else {
                snake.pop();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const size = canvas.width / GRID_SIZE;

            // Particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x*size, p.y*size, p.r, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Food
            const fPulse = Math.sin(Date.now() / 150) * 2;
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#fbbf24';
            ctx.fillStyle = '#fbbf24';
            ctx.beginPath(); ctx.arc(food.x*size + size/2, food.y*size + size/2, size/3.2 + fPulse/10, 0, Math.PI*2); ctx.fill();

            // Snake
            const skin = SKINS.find(s => s.id === data.currentSkin) || SKINS[0];
            snake.forEach((seg, i) => {
                const isHead = i === 0;
                ctx.save();
                ctx.translate(seg.x*size + size/2, seg.y*size + size/2);
                
                if (skin.animated) ctx.fillStyle = `hsl(${(Date.now()/12 + i*20)%360}, 80%, 65%)`;
                else if (skin.grad) {
                    const g = ctx.createLinearGradient(-size/2, -size/2, size/2, size/2);
                    skin.grad.forEach((c, idx) => g.addColorStop(idx/(skin.grad.length-1), c));
                    ctx.fillStyle = g;
                } else if (skin.type === 'glitch') ctx.fillStyle = Math.random() > 0.98 ? '#fff' : skin.color;
                else ctx.fillStyle = skin.color;
                
                ctx.shadowBlur = isHead ? 40 : 15;
                ctx.shadowColor = skin.color;
                const r = isHead ? size/2 - 1 : size/2 - 2.5;

                if (skin.type === 'diamond') { ctx.rotate(Math.PI/4); ctx.fillRect(-r, -r, r*2, r*2); }
                else if (skin.type === 'circle') { ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill(); }
                else if (skin.type === 'ghost') { ctx.globalAlpha = 0.4 + Math.sin(Date.now()/200)*0.3; roundRect(ctx, -r, -r, r*2, r*2, 6); ctx.fill(); }
                else { roundRect(ctx, -r, -r, r*2, r*2, isHead?10:6); ctx.fill(); }

                if (isHead) {
                    ctx.shadowBlur = 0; ctx.fillStyle = '#000';
                    ctx.beginPath(); ctx.arc(-r/3, -r/3, 2.5, 0, Math.PI*2); ctx.arc(r/3, -r/3, 2.5, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            });
        }

        function gameOver() {
            gameActive = false;
            hideAllScreens();
            document.getElementById('screen-over').classList.remove('hidden');
            document.getElementById('final-score-val').innerText = score;
            const earned = Math.floor(score * 2) * (data.upgrades.multi > 0 ? 3 : 1);
            document.getElementById('earned-coins-val').innerText = '+' + earned;
            data.coins += earned;
            if (score > data.highScore) data.highScore = score;
            trackMissions();
            saveData();
        }

        function placeFood() {
            food = { x: Math.floor(Math.random()*GRID_SIZE), y: Math.floor(Math.random()*GRID_SIZE) };
            if (snake.some(s => s.x === food.x && s.y === food.y)) placeFood();
        }

        function spawnParticles(x, y) {
            for(let i=0; i<20; i++) {
                particles.push({
                    x: x + 0.5, y: y + 0.5, 
                    vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4,
                    r: Math.random()*4 + 1, life: 1.2, color: '#fbbf24'
                });
            }
        }

        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y); ctx.quadraticCurveTo(x + width, y, x + width, y + radius); ctx.lineTo(x + width, y + height - radius); ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); ctx.lineTo(x + radius, y + height); ctx.quadraticCurveTo(x, y + height, x, y + height - radius); ctx.lineTo(x, y + radius); ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath();
        }

        // --- Missions ---
        function checkDailyMissions() {
            const today = new Date().toDateString();
            if (data.lastMissionDate !== today) {
                const pool = [
                    { id: 1, text: 'التهام 100 قطعة إجمالية', target: 100, field: 'totalFood', prize: 2000 },
                    { id: 2, text: 'تحقيق نتيجة 50 في جولة واحدة', target: 50, field: 'maxScore', prize: 3500 },
                    { id: 3, text: 'اللعب لـ 15 جولة متتالية', target: 15, field: 'gamesPlayed', prize: 1000 },
                    { id: 4, text: 'تغيير السكن 5 مرات', target: 5, field: 'skinChanged', prize: 500 }
                ];
                data.missions = pool.sort(() => 0.5 - Math.random()).slice(0, 3).map(m => ({...m, progress: 0, completed: false, claimed: false}));
                data.lastMissionDate = today;
                saveData();
            }
        }

        function trackMissions(field, value = 1) {
            data.missions.forEach(m => {
                if (m.completed) return;
                if (m.field === 'totalFood') m.progress += score;
                if (m.field === 'maxScore') m.progress = Math.max(m.progress, score);
                if (m.field === 'gamesPlayed') m.progress += 1;
                if (m.field === field) m.progress += value;
                if (m.progress >= m.target) { m.progress = m.target; m.completed = true; }
            });
        }

        function toggleMissionModal(show) {
            document.getElementById('mission-modal').classList.toggle('hidden', !show);
            if (!show) return;
            const container = document.getElementById('mission-content');
            container.innerHTML = data.missions.map(m => `
                <div class="mission-card p-10 rounded-[3rem] border ${m.completed?'border-amber-500/30 bg-amber-500/5':'border-white/5 bg-white/5'} transition-all group">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-xl font-display italic ${m.completed?'text-amber-500':'text-zinc-300'}">${m.text}</span>
                        <span class="font-mono text-zinc-500">${m.progress}/${m.target}</span>
                    </div>
                    <div class="h-2 w-full bg-white/5 rounded-full overflow-hidden mb-6">
                        <div class="h-full bg-amber-500 transition-all duration-1000" style="width: ${(m.progress/m.target)*100}%"></div>
                    </div>
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3 text-amber-500 font-black text-xs uppercase tracking-widest">
                            <i data-lucide="gem" class="w-4 h-4"></i> +${m.prize}
                        </div>
                        ${m.completed && !m.claimed ? `<button onclick="claimMission(${m.id})" class="px-8 py-3 bg-white text-black text-[10px] font-black rounded-full uppercase scale-110">استلام</button>` : 
                        (m.claimed ? `<span class="text-[10px] text-emerald-500 font-black uppercase tracking-widest">تم التحصيل ✓</span>` : `<span class="text-[10px] text-zinc-700 font-black uppercase tracking-widest">انتظار...</span>`)}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function claimMission(id) {
            const m = data.missions.find(m => m.id === id);
            if (m && m.completed && !m.claimed) { m.claimed = true; data.coins += m.prize; saveData(); toggleMissionModal(true); }
        }

        // --- Shop ---
        let currentTab = 'SKINS';
        function toggleShop(show) { document.getElementById('shop-modal').classList.toggle('hidden', !show); if(show) setTab(currentTab); }
        function setTab(tab) {
            currentTab = tab;
            ['SKINS', 'BACKGROUNDS', 'UPGRADES'].forEach(t => {
                const btn = document.getElementById('tab-' + t.toLowerCase());
                btn.className = `pb-6 text-xs uppercase tracking-[0.3em] font-black border-b-2 transition-all ${t===tab?'border-amber-500 text-white':'border-transparent text-zinc-600 hover:text-white'}`;
            });
            renderShop();
        }

        function renderShop() {
            const container = document.getElementById('shop-content');
            container.innerHTML = '';
            const grid = document.createElement('div');
            grid.className = currentTab === 'UPGRADES' ? 'space-y-6' : 'grid grid-cols-2 gap-10';

            if (currentTab === 'SKINS') {
                SKINS.forEach(s => {
                    const owned = data.ownedSkins.includes(s.id);
                    const active = data.currentSkin === s.id;
                    grid.innerHTML += `
                        <div class="group p-10 rounded-[3.5rem] border ${active?'border-amber-500 bg-amber-500/5':'border-white/5 bg-white/5'} transition-all text-center">
                            <div class="w-24 h-24 mx-auto mb-8 flex items-center justify-center rounded-[2.5rem] glass group-hover:scale-110 transition-transform">
                                <div class="w-14 h-14 rounded-xl" style="background:${s.grad?`linear-gradient(45deg,${s.grad[0]},${s.grad[2]})`:s.color}; box-shadow:0 0 30px ${s.color}66; border-radius:${s.type==='circle'?'50%':(s.type==='diamond'?'12px':'4px')}; transform:${s.type==='diamond'?'rotate(45deg)':'none'}"></div>
                            </div>
                            <h4 class="text-3xl font-display italic mb-2">${s.name}</h4>
                            <div class="text-[10px] uppercase font-black text-zinc-600 mb-8">${owned?'ممتلك':'السعر: '+s.price}</div>
                            <button onclick="${owned?`selectSkin('${s.id}')`:`buySkin('${s.id}',${s.price})`}" class="w-full py-6 rounded-3xl text-[10px] font-black uppercase tracking-widest transition-all ${active?'bg-amber-500 text-black':(owned?'bg-white/10 text-white hover:bg-white/20':'bg-white text-black active:scale-95')}" ${active?'disabled':''}>
                                ${active?'نشط الآن':(owned?'تفعيل':'شراء')}
                            </button>
                        </div>`;
                });
            } else if (currentTab === 'BACKGROUNDS') {
                BACKGROUNDS.forEach(b => {
                    const owned = data.ownedBackgrounds.includes(b.id);
                    const active = data.currentBackground === b.id;
                    grid.innerHTML += `
                        <div class="group p-10 rounded-[3.5rem] border ${active?'border-amber-500 bg-amber-500/5':'border-white/5 bg-white/5'} transition-all text-center">
                            <div class="w-full h-40 rounded-[2.5rem] mb-8 overflow-hidden glass">
                                <div class="w-full h-full" style="background:${b.gradient||b.color}; ${b.grid?'background-image:radial-gradient(circle at 2px 2px,rgba(255,255,255,0.2) 1px,transparent 0); background-size:20px 20px':''}"></div>
                            </div>
                            <h4 class="text-3xl font-display italic mb-2">${b.name}</h4>
                            <div class="text-[10px] uppercase font-black text-zinc-600 mb-8">${owned?'ممتلك':'السعر: '+b.price}</div>
                            <button onclick="${owned?`selectBg('${b.id}')`:`buyBg('${b.id}',${b.price})`}" class="w-full py-6 rounded-3xl text-[10px] font-black uppercase tracking-widest transition-all ${active?'bg-amber-500 text-black':(owned?'bg-white/10 text-white hover:bg-white/20':'bg-white text-black active:scale-95')}" ${active?'disabled':''}>
                                ${active?'البيئة النشطة':(owned?'تطبيق':'شراء')}
                            </button>
                        </div>`;
                });
            } else {
                UPGRADES.forEach(u => {
                    const level = data.upgrades[u.id] || 0;
                    const maxed = level >= u.max;
                    grid.innerHTML += `
                        <div class="p-12 rounded-[4rem] bg-white/5 border border-white/5 flex items-center justify-between hover:bg-white/10 transition-all group">
                            <div class="flex items-center gap-10">
                                <div class="w-24 h-24 rounded-[2.5rem] glass flex items-center justify-center text-zinc-400 group-hover:text-amber-500 transition-colors"><i data-lucide="${u.icon}" class="w-12 h-12"></i></div>
                                <div>
                                    <h4 class="text-4xl font-display italic mb-2">${u.name}</h4>
                                    <p class="text-[11px] text-zinc-600 font-black uppercase tracking-widest">${u.desc}</p>
                                    <div class="flex gap-2.5 mt-6">
                                        ${Array.from({length:u.max}).map((_,i) => `<div class="h-2 w-12 rounded-full ${i<level?'bg-amber-500':'bg-white/10'} shadow-lg shadow-amber-500/0 ${i<level?'shadow-amber-500/20':''}"></div>`).join('')}
                                    </div>
                                </div>
                            </div>
                            <button onclick="${maxed?'':`buyUpgrade('${u.id}',${u.price})`}" class="px-12 py-6 rounded-full font-black text-xs transition-all ${maxed?'bg-zinc-800 text-zinc-600 cursor-not-allowed':'bg-white text-black hover:scale-105 active:scale-95 shadow-xl'} shadow-white/5" ${maxed?'disabled':''}>
                                ${maxed?'MAX':u.price + ' جوهرة'}
                            </button>
                        </div>`;
                });
            }
            container.appendChild(grid);
            lucide.createIcons();
        }

        // --- Store Actions ---
        function buySkin(id, p) { if(data.coins>=p){ data.coins-=p; data.ownedSkins.push(id); saveData(); renderShop(); } }
        function selectSkin(id) { data.currentSkin=id; trackMissions('skinChanged'); saveData(); renderShop(); }
        function buyBg(id, p) { if(data.coins>=p){ data.coins-=p; data.ownedBackgrounds.push(id); saveData(); renderShop(); } }
        function selectBg(id) { data.currentBackground=id; applyBackground(); saveData(); renderShop(); }
        function buyUpgrade(id, p) { if(data.coins>=p){ data.coins-=p; data.upgrades[id]++; saveData(); renderShop(); } }

        function renderRatingStars() {
            const c = document.getElementById('rating-stars');
            c.innerHTML = '';
            for(let i=1; i<=5; i++){
                const s = document.createElement('i'); s.setAttribute('data-lucide', 'star');
                s.className = `w-8 h-8 cursor-pointer transition-all hover:scale-125 ${i<=data.rating?'star-active':'star-inactive'}`;
                s.onclick = () => { data.rating=i; saveData(); renderRatingStars(); };
                c.appendChild(s);
            }
            lucide.createIcons();
        }

        function hideAllScreens() { ['screen-start', 'screen-game', 'screen-over'].forEach(s => document.getElementById(s).classList.add('hidden')); }

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' && direction !== 'DOWN') nextDirection = 'UP';
            if (e.key === 'ArrowDown' && direction !== 'UP') nextDirection = 'DOWN';
            if (e.key === 'ArrowLeft' && direction !== 'RIGHT') nextDirection = 'LEFT';
            if (e.key === 'ArrowRight' && direction !== 'LEFT') nextDirection = 'RIGHT';
        });

        // Prevention for mobile scrolling
        window.addEventListener('touchmove', e => e.preventDefault(), {passive:false});
    </script>
</body>
</html>
