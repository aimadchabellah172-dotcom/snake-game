<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE LUXE: LEGENDARY OVERDRIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-primary: #BF953F;
            --gold-light: #FCF6BA;
            --gold-dark: #B38728;
            --font-display: "Playfair Display", serif;
            --font-sans: "Inter", sans-serif;
            --font-mono: "Space Grotesk", sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: var(--font-sans);
            overflow: hidden;
            margin: 0;
            user-select: none;
            cursor: crosshair;
        }

        /* --- Luxury Backgrounds --- */
        #main-bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            transition: all 2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #bg-fx-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.4;
            pointer-events: none;
        }

        /* --- Typography & Branding --- */
        .gold-text {
            background: linear-gradient(to bottom right, var(--gold-primary), var(--gold-light), var(--gold-dark), var(--gold-light), var(--gold-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .luxury-blur {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .hud-label {
            font-family: var(--font-mono);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: rgba(255,255,255,0.4);
            font-weight: 700;
        }

        /* --- Animations --- */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }
        .float-anim { animation: float 10s infinite ease-in-out; }

        @keyframes pulse-ring {
            0% { transform: scale(0.9); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .pulse-ring::before {
            content: '';
            position: absolute;
            inset: -10px;
            border: 2px solid var(--gold-primary);
            border-radius: 50%;
            animation: pulse-ring 2s infinite;
        }

        .screen-transition {
            transition: all 1s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .hidden-screen {
            pointer-events: none;
            opacity: 0;
            filter: blur(20px);
            transform: scale(0.9) translateY(20px);
        }

        /* --- Scrollbar --- */
        .hide-scroll::-webkit-scrollbar { display: none; }

        canvas {
            image-rendering: pixelated;
        }

        /* --- Glitch Effect for Cyber Skins --- */
        .glitch-text {
            position: relative;
        }
        .glitch-text::before, .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.8;
        }
        .glitch-text::before { color: #0ff; z-index: -1; animation: glitch 0.4s infinite; }
        .glitch-text::after { color: #f0f; z-index: -2; animation: glitch 0.4s infinite 0.2s; }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <!-- Dynamic Background Systems -->
    <div id="main-bg"></div>
    <canvas id="bg-fx-canvas"></canvas>

    <!-- App Wrapper -->
    <div id="app" class="relative h-screen w-screen flex items-center justify-center overflow-hidden">
        
        <!-- Top HUD (Available Everywhere) -->
        <div id="hud-top" class="fixed top-0 inset-x-0 p-12 z-50 flex justify-between items-start transition-all duration-700">
            <div class="flex gap-16">
                <div class="flex flex-col group cursor-help">
                    <span class="hud-label group-hover:text-amber-400 transition-colors">عظمة التاريخ</span>
                    <span id="stat-high-score" class="text-5xl font-display italic font-black gold-text leading-tight">0</span>
                </div>
                <div class="flex flex-col group">
                    <span class="hud-label group-hover:text-blue-400 transition-colors">رصيد الذهب</span>
                    <div class="flex items-center gap-3">
                        <i data-lucide="gem" class="w-6 h-6 text-blue-400"></i>
                        <span id="stat-coins" class="text-5xl font-display italic font-black text-white/90 leading-tight">0</span>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <!-- Power-up HUD (Visible during gameplay) -->
                <div id="active-powers" class="flex gap-2 opacity-0 transition-opacity">
                    <!-- Dynamic Icons -->
                </div>
                
                <button onclick="UI.toggle('missions')" class="relative p-5 luxury-blur rounded-3xl group active:scale-95 transition-transform overflow-hidden">
                    <div class="absolute inset-0 bg-amber-500/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <i data-lucide="award" class="w-7 h-7 text-amber-500 group-hover:scale-110 transition-transform"></i>
                    <span id="mission-notifier" class="hidden absolute top-4 right-4 w-3 h-3 bg-red-500 rounded-full border-2 border-black"></span>
                </button>
                <button onclick="UI.toggle('shop')" class="group flex items-center gap-5 px-10 py-5 luxury-blur rounded-3xl hover:bg-white/5 active:scale-95 transition-all">
                    <div class="p-2 bg-white/5 rounded-xl"><i data-lucide="crown" class="w-5 h-5 text-amber-500"></i></div>
                    <span class="hud-label text-zinc-300 font-black leading-none">الأرشيف الملكي</span>
                </button>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="screen-start" class="screen-transition flex flex-col items-center justify-center text-center z-10">
            <div class="mb-12 float-anim">
                <div id="logo-container" class="relative">
                    <h1 class="text-[18rem] font-display italic gold-text font-black leading-[0.8] tracking-tighter drop-shadow-[0_20px_100px_rgba(191,149,63,0.3)]">LUXE</h1>
                    <div class="absolute -bottom-4 right-4 flex items-center gap-4 bg-black/50 backdrop-blur-xl px-6 py-2 rounded-full border border-white/5">
                        <span class="hud-label tracking-[1em]">OVERDRIVE</span>
                        <span class="text-[8px] font-black bg-amber-500 text-black px-2 py-0.5 rounded italic">V4.0</span>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-12 items-center">
                <button onclick="Game.init()" class="group relative py-10 px-24 rounded-[3rem] overflow-hidden transition-all hover:scale-105 active:scale-95">
                    <div class="absolute inset-0 bg-white luxury-blur border-none"></div>
                    <div class="absolute inset-0 bg-gradient-to-r from-amber-500 via-yellow-200 to-amber-500 opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
                    <span class="relative z-10 text-4xl font-display italic font-black text-white group-hover:text-black transition-colors flex items-center gap-6">
                        ابدأ الملحمة <i data-lucide="play" class="w-8 h-8 fill-current"></i>
                    </span>
                </button>

                <div class="flex gap-16 items-center py-8 px-16 luxury-blur rounded-[3rem]">
                    <div class="flex flex-col items-end">
                        <span class="hud-label mb-2 text-zinc-500">جودة التجربة</span>
                        <div id="start-rating" class="flex gap-2"></div>
                    </div>
                    <div class="h-8 w-px bg-white/5"></div>
                    <div class="flex flex-col items-start">
                        <span class="hud-label mb-2 text-zinc-500">وضع اللعب</span>
                        <span class="text-xs font-black text-amber-500 uppercase tracking-widest">تلقيدي فاخر</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="screen-game" class="screen-transition hidden-screen flex flex-col items-center justify-center z-10">
            <div id="game-ui" class="mb-16 flex flex-col items-center transition-all duration-500">
                <span class="hud-label text-zinc-500 mb-2">إنجاز الجولة</span>
                <div id="game-score" class="text-9xl font-display italic font-black gold-text leading-none">0</div>
                <div id="combo-display" class="mt-4 opacity-0 scale-50 transition-all font-mono italic text-amber-400 font-black">COMBO X2</div>
            </div>
            
            <div id="canvas-container" class="relative group">
                <!-- Aura around canvas -->
                <div id="canvas-aura" class="absolute -inset-10 bg-amber-500/5 blur-[80px] rounded-full opacity-0 transition-opacity duration-1000"></div>
                <div class="relative p-2 rounded-[4rem] bg-gradient-to-br from-white/10 to-transparent luxury-blur border-none shadow-[0_50px_100px_-20px_rgba(0,0,0,0.8)]">
                    <canvas id="game-canvas" width="600" height="600" class="rounded-[3.5rem]"></canvas>
                </div>
            </div>

            <div class="mt-16 flex gap-12 text-zinc-600 font-black text-[10px] uppercase tracking-[0.4em]">
                <div class="flex items-center gap-3"><i data-lucide="keyboard" class="w-4 h-4"></i> الأسهم للتحكم</div>
                <div class="flex items-center gap-3"><i data-lucide="zap" class="w-4 h-4 text-amber-400"></i> معالجة بصرية بدقة 4K</div>
            </div>
        </div>

        <!-- Shop Modal -->
        <div id="modal-shop" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-8 backdrop-blur-2xl">
            <div class="absolute inset-0 bg-black/90" onclick="UI.toggle('shop')"></div>
            <div class="relative w-full max-w-6xl h-[85vh] bg-[#080808] border border-white/5 rounded-[5rem] flex flex-col overflow-hidden shadow-2xl">
                <div class="p-16 pb-12 flex justify-between items-center">
                    <div class="flex items-center gap-8">
                        <div class="w-20 h-20 rounded-3xl bg-amber-500/10 flex items-center justify-center text-amber-500">
                            <i data-lucide="library" class="w-10 h-10"></i>
                        </div>
                        <div>
                            <h2 class="text-6xl font-display italic font-black">الأرشيف الملكي</h2>
                            <p class="hud-label mt-2 text-zinc-500">خصص اسطورتك بالمقتنيات الفاخرة</p>
                        </div>
                    </div>
                    <button onclick="UI.toggle('shop')" class="p-4 hover:bg-white/5 rounded-full transition-colors active:scale-90">
                        <i data-lucide="x-circle" class="w-10 h-10 text-zinc-700"></i>
                    </button>
                </div>
                
                <div class="px-16 flex gap-12 border-b border-white/5">
                    <button onclick="UI.setShopTab('skins')" id="btn-tab-skins" class="pb-8 text-xs font-black uppercase tracking-[0.4em] border-b-2 transition-all">الجلود الأسطورية</button>
                    <button onclick="UI.setShopTab('upgrades')" id="btn-tab-upgrades" class="pb-8 text-xs font-black uppercase tracking-[0.4em] border-b-2 transition-all">تطويرات الذات</button>
                    <button onclick="UI.setShopTab('environments')" id="btn-tab-environments" class="pb-8 text-xs font-black uppercase tracking-[0.4em] border-b-2 transition-all">البيئات الكونية</button>
                </div>

                <div id="shop-content" class="flex-1 overflow-y-auto p-16 hide-scroll"></div>
            </div>
        </div>

        <!-- GameOver Screen -->
        <div id="screen-over" class="screen-transition hidden-screen flex flex-col items-center justify-center text-center z-10">
            <h2 class="text-[12rem] font-display italic text-red-600 font-black tracking-tighter mb-12 drop-shadow-[0_0_50px_rgba(220,38,38,0.4)]">النهـاية.</h2>
            
            <div class="flex gap-8 mb-16">
                <div class="p-16 luxury-blur rounded-[4rem] min-w-[350px] flex flex-col items-center">
                    <span class="hud-label mb-6">نتيجة المعرقة</span>
                    <span id="over-score" class="text-8xl font-display italic font-black">0</span>
                </div>
                <div class="p-16 luxury-blur rounded-[4rem] min-w-[350px] flex flex-col items-center">
                    <span class="hud-label mb-6">غنائم الحرب</span>
                    <div class="flex items-center gap-4">
                        <i data-lucide="gem" class="w-10 h-10 text-blue-400"></i>
                        <span id="over-coins" class="text-8xl font-display italic font-black text-blue-400">0</span>
                    </div>
                </div>
            </div>

            <button onclick="Game.init()" class="group relative py-10 px-24 bg-white text-black rounded-full transition-all hover:scale-110 active:scale-95 shadow-[0_30px_60px_-15px_rgba(255,255,255,0.3)]">
                <span class="text-4xl font-display italic font-black flex items-center gap-6">إعادة الانبعاث <i data-lucide="rotate-cw" class="w-8 h-8"></i></span>
            </button>
        </div>

    </div>

    <!-- Missions Popover -->
    <div id="modal-missions" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-8 backdrop-blur-3xl">
        <div class="absolute inset-0 bg-black/90" onclick="UI.toggle('missions')"></div>
        <div class="relative w-full max-w-3xl bg-[#080808] border border-white/5 rounded-[4rem] p-16 flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-12">
                <h3 class="text-5xl font-display italic font-black">لوحة الإنجازات</h3>
                <button onclick="UI.toggle('missions')" class="text-zinc-600 hover:text-white transition-colors"><i data-lucide="x-circle" class="w-8 h-8"></i></button>
            </div>
            <div id="mission-list" class="space-y-8"></div>
        </div>
    </div>

    <script>
        /**
         * LEGENDARY SNAKE SYSTEM V4.0
         * Lines: 1000+ Goal
         * Philosophy: Pure Luxury, Heavy Animation, Advanced Particle Math
         */

        // --- GLOBAL CONFIGURATION ---
        const CONFIG = {
            GRID_COUNT: 30,
            BASE_SPEED: 130,
            SPEED_MULTIPLIER: 0.96,
            MIN_SPEED: 45,
            PARTICLE_COUNT: 25,
            LUXURY_COLORS: {
                GOLD: '#BF953F',
                DIAMOND: '#0EA5E9',
                RUBY: '#EF4444',
                EMERALD: '#10B981',
                COSMIC: '#A855F7'
            }
        };

        // --- GAME STATE ---
        let GAME = {
            active: false,
            score: 0,
            coinsEaten: 0,
            snake: [],
            food: { x: 5, y: 5 },
            specialFood: null,
            direction: 'RIGHT',
            nextDirection: 'RIGHT',
            lastUpdate: 0,
            tickDelta: 0,
            combo: 0,
            comboTimeout: null,
            particles: [],
            highScore: 0,
            coins: 0,
            ownedSkins: ['classic'],
            currentSkin: 'classic',
            ownedEnvs: ['void'],
            currentEnv: 'void',
            upgrades: { magnet: 0, shield: 0, slowmo: 0, luck: 0 },
            rating: 0,
            missions: []
        };

        // --- CONTENT LIBRARIES ---
        const SKINS = [
            { id: 'classic', name: 'الكلاسيكي الفاخر', color: '#10b981', price: 0, type: 'rounded', aura: false },
            { id: 'gold', name: 'السيادة المطلقة', color: '#BF953F', price: 2500, type: 'diamond', aura: 'gold', grad: ['#BF953F', '#FCF6BA', '#B38728'] },
            { id: 'ruby', name: 'شعلة الجحيم', color: '#EF4444', price: 5000, type: 'circle', aura: 'fire', animated: true },
            { id: 'phantom', name: 'الشبح الرقمي', color: '#ffffff', price: 10000, type: 'ghost', aura: 'glitch', animated: true },
            { id: 'cyber', name: 'نيون المستقبل', color: '#ec4899', price: 15000, type: 'rect', aura: 'neon', glitch: true },
            { id: 'divine', name: 'الكيان الإلهي', color: '#8b5cf6', price: 50000, type: 'star', aura: 'galaxy', animated: true }
        ];

        const UPGRADES = [
            { id: 'magnet', name: 'المغناطيس الكوني', desc: 'يجذب الجواهر من أبعاد بعيدة', cost: 1500, max: 10, icon: 'zap' },
            { id: 'slowmo', name: 'منظم الوقت', desc: 'يبطئ مرور اللحظات بالتدريج', cost: 2000, max: 5, icon: 'clock' },
            { id: 'shield', name: 'عقد الحماية', desc: 'يسمح بكسر قواعد الموت لمرة واحدة', cost: 8000, max: 1, icon: 'shield' },
            { id: 'luck', name: 'رداء الحظ', desc: 'يزيد احتمالية ظهور المكافآت الأسطورية', cost: 5000, max: 8, icon: 'sparkles' }
        ];

        const ENVIRONMENTS = [
            { id: 'void', name: 'الفراغ السرمدي', bg: '#000', overlay: 'none', price: 0 },
            { id: 'nebula', name: 'سديم الأرواح', bg: '#10051a', overlay: 'nebula', price: 5000 },
            { id: 'matrix', name: 'واقع مشفر', bg: '#000', overlay: 'matrix', price: 12000 },
            { id: 'royal', name: 'القصر الملكي', bg: '#1a0d01', overlay: 'silk', price: 20000 }
        ];

        // --- RENDER ENGINE (Post Processing & Particles) ---
        const Renderer = {
            mainCanvas: null,
            ctx: null,
            bgCanvas: null,
            bgCtx: null,

            init() {
                this.mainCanvas = document.getElementById('game-canvas');
                this.ctx = this.mainCanvas.getContext('2d', { alpha: true });
                this.bgCanvas = document.getElementById('bg-fx-canvas');
                this.bgCtx = this.bgCanvas.getContext('2d');
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.startBackgroundLoop();
            },

            resize() {
                this.bgCanvas.width = window.innerWidth;
                this.bgCanvas.height = window.innerHeight;
            },

            startBackgroundLoop() {
                const draw = () => {
                    this.bgCtx.clearRect(0, 0, this.bgCanvas.width, this.bgCanvas.height);
                    
                    // Simple Dust Particles
                    for(let i=0; i<30; i++) {
                        const t = Date.now() / 3000 + i;
                        const x = (Math.sin(t) * 0.5 + 0.5) * this.bgCanvas.width;
                        const y = (Math.cos(t * 0.8) * 0.5 + 0.5) * this.bgCanvas.height;
                        this.bgCtx.fillStyle = 'rgba(191, 149, 63, 0.2)';
                        this.bgCtx.beginPath();
                        this.bgCtx.arc(x, y, 1.5, 0, Math.PI*2);
                        this.bgCtx.fill();
                    }
                    requestAnimationFrame(draw);
                };
                draw();
            },

            spawnExplosion(gridX, gridY, color) {
                const size = this.mainCanvas.width / CONFIG.GRID_COUNT;
                const px = gridX * size + size/2;
                const py = gridY * size + size/2;

                for(let i=0; i<CONFIG.PARTICLE_COUNT; i++) {
                    GAME.particles.push({
                        x: px, y: py,
                        vx: (Math.random() - 0.5) * 12,
                        vy: (Math.random() - 0.5) * 12,
                        r: Math.random() * 4 + 1,
                        alpha: 1,
                        color: color,
                        life: 1.0
                    });
                }
            },

            drawSnake() {
                const skin = SKINS.find(s => s.id === GAME.currentSkin);
                const size = this.mainCanvas.width / CONFIG.GRID_COUNT;

                GAME.snake.forEach((seg, i) => {
                    const isHead = i === 0;
                    this.ctx.save();
                    this.ctx.translate(seg.x * size + size/2, seg.y * size + size/2);

                    // Dynamic Glow (Bloom Simulation)
                    this.ctx.shadowBlur = isHead ? 40 : 15;
                    this.ctx.shadowColor = skin.color;

                    // Color Logic
                    if(skin.animated) {
                        this.ctx.fillStyle = `hsl(${(Date.now()/10 + i*15)%360}, 85%, 65%)`;
                    } else if(skin.grad) {
                        const g = this.ctx.createLinearGradient(-size/2, -size/2, size/2, size/2);
                        skin.grad.forEach((c, idx) => g.addColorStop(idx/(skin.grad.length-1), c));
                        this.ctx.fillStyle = g;
                    } else {
                        this.ctx.fillStyle = skin.color;
                    }

                    // Special Shapes
                    const r = isHead ? size/2 - 1 : size/2 - 3;
                    if(skin.type === 'diamond') {
                        this.ctx.rotate(Math.PI/4);
                        this.ctx.fillRect(-r, -r, r*2, r*2);
                    } else if(skin.type === 'circle') {
                        this.ctx.beginPath(); this.ctx.arc(0,0,r,0,Math.PI*2); this.ctx.fill();
                    } else if(skin.type === 'star') {
                        this.drawStar(0, 0, 5, r, r/2);
                    } else if(skin.type === 'ghost') {
                        this.ctx.globalAlpha = 0.5 + Math.sin(Date.now()/200)*0.2;
                        this.roundRect(this.ctx, -r, -r, r*2, r*2, 6); this.ctx.fill();
                    } else {
                        this.roundRect(this.ctx, -r, -r, r*2, r*2, isHead?10:6); this.ctx.fill();
                    }

                    if(isHead) {
                        this.ctx.shadowBlur = 0;
                        this.ctx.fillStyle = '#000';
                        this.ctx.beginPath(); this.ctx.arc(-r/3, -r/3, 2, 0, Math.PI*2); this.ctx.fill();
                        this.ctx.beginPath(); this.ctx.arc(r/3, -r/3, 2, 0, Math.PI*2); this.ctx.fill();
                    }
                    this.ctx.restore();
                });
            },

            drawStar(cx, cy, spikes, outerRadius, innerRadius) {
                let rot = Math.PI / 2 * 3;
                let x = cx;
                let y = cy;
                let step = Math.PI / spikes;

                this.ctx.beginPath();
                this.ctx.moveTo(cx, cy - outerRadius);
                for (let i = 0; i < spikes; i++) {
                    x = cx + Math.cos(rot) * outerRadius;
                    y = cy + Math.sin(rot) * outerRadius;
                    this.ctx.lineTo(x, y);
                    rot += step;

                    x = cx + Math.cos(rot) * innerRadius;
                    y = cy + Math.sin(rot) * innerRadius;
                    this.ctx.lineTo(x, y);
                    rot += step;
                }
                this.ctx.lineTo(cx, cy - outerRadius);
                this.ctx.closePath();
                this.ctx.fill();
            },

            roundRect(ctx, x, y, width, height, radius) {
                ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y); 
                ctx.quadraticCurveTo(x + width, y, x + width, y + radius); ctx.lineTo(x + width, y + height - radius); 
                ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); ctx.lineTo(x + radius, y + height); 
                ctx.quadraticCurveTo(x, y + height, x, y + height - radius); ctx.lineTo(x, y + radius); 
                ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath();
            }
        };

        // --- GAME LOGIC ---
        const Game = {
            init() {
                UI.changeScreen('game');
                GAME.active = true;
                GAME.score = 0;
                GAME.combo = 0;
                GAME.direction = 'RIGHT';
                GAME.nextDirection = 'RIGHT';
                GAME.snake = [
                    {x: 10, y: 10},
                    {x: 9, y: 10},
                    {x: 8, y: 10}
                ];
                GAME.particles = [];
                this.placeFood();
                this.tick();
                
                document.getElementById('game-score').innerText = '0';
                document.getElementById('canvas-aura').style.opacity = '1';
            },

            tick(time) {
                if(!GAME.active) return;

                const delta = time - GAME.lastUpdate;
                const targetSpeed = Math.max(CONFIG.MIN_SPEED, CONFIG.BASE_SPEED - (GAME.score * 1.5) + (GAME.upgrades.slowmo * 8));

                if(delta >= targetSpeed) {
                    this.update();
                    GAME.lastUpdate = time;
                }

                this.render();
                requestAnimationFrame((t) => this.tick(t));
            },

            update() {
                GAME.direction = GAME.nextDirection;
                const head = { ...GAME.snake[0] };

                if(GAME.direction === 'UP') head.y--;
                if(GAME.direction === 'DOWN') head.y++;
                if(GAME.direction === 'LEFT') head.x--;
                if(GAME.direction === 'RIGHT') head.x++;

                // Collision Detection
                if(head.x < 0 || head.x >= CONFIG.GRID_COUNT || head.y < 0 || head.y >= CONFIG.GRID_COUNT ||
                   GAME.snake.some(s => s.x === head.x && s.y === head.y)) {
                    return this.gameOver();
                }

                GAME.snake.unshift(head);

                // Magnet Skill
                if(GAME.upgrades.magnet > 0) {
                    const d = Math.hypot(head.x - GAME.food.x, head.y - GAME.food.y);
                    if(d < 3 + GAME.upgrades.magnet * 0.8) {
                        if(GAME.food.x < head.x) GAME.food.x++; else if(GAME.food.x > head.x) GAME.food.x--;
                        if(GAME.food.y < head.y) GAME.food.y++; else if(GAME.food.y > head.y) GAME.food.y--;
                    }
                }

                // Food Check
                if(head.x === GAME.food.x && head.y === GAME.food.y) {
                    this.onEat();
                    this.placeFood();
                } else {
                    GAME.snake.pop();
                }

                // Particles Update
                GAME.particles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy;
                    p.life -= 0.02;
                    if(p.life <= 0) GAME.particles.splice(i, 1);
                });
            },

            onEat() {
                GAME.score += (1 + GAME.combo);
                GAME.coinsEaten++;
                document.getElementById('game-score').innerText = GAME.score;
                
                // Blast Effect
                Renderer.spawnExplosion(GAME.food.x, GAME.food.y, CONFIG.LUXURY_COLORS.GOLD);

                // Combo Logic
                GAME.combo++;
                const comboEl = document.getElementById('combo-display');
                comboEl.innerText = `COMBO X${GAME.combo + 1}`;
                comboEl.style.opacity = '1';
                comboEl.style.transform = 'scale(1.2)';
                
                if(GAME.comboTimeout) clearTimeout(GAME.comboTimeout);
                GAME.comboTimeout = setTimeout(() => {
                    GAME.combo = 0;
                    comboEl.style.opacity = '0';
                    comboEl.style.transform = 'scale(0.5)';
                }, 2000);

                // Animation Polish
                document.getElementById('canvas-container').style.transform = 'scale(1.02)';
                setTimeout(() => document.getElementById('canvas-container').style.transform = 'scale(1)', 100);
            },

            placeFood() {
                GAME.food = {
                    x: Math.floor(Math.random() * CONFIG.GRID_COUNT),
                    y: Math.floor(Math.random() * CONFIG.GRID_COUNT)
                };
                if(GAME.snake.some(s => s.x === GAME.food.x && s.y === GAME.food.y)) this.placeFood();
            },

            render() {
                const ctx = Renderer.ctx;
                const canvas = Renderer.mainCanvas;
                const size = canvas.width / CONFIG.GRID_COUNT;

                ctx.clearRect(0,0, canvas.width, canvas.height);

                // Grid (Subtle Luxury)
                ctx.strokeStyle = 'rgba(255,255,255,0.03)';
                ctx.lineWidth = 0.5;
                for(let i=0; i<CONFIG.GRID_COUNT; i++) {
                    ctx.beginPath(); ctx.moveTo(i*size, 0); ctx.lineTo(i*size, canvas.height); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, i*size); ctx.lineTo(canvas.width, i*size); ctx.stroke();
                }

                // Food
                const pulse = Math.sin(Date.now()/150) * 4;
                ctx.shadowBlur = 30 + pulse;
                ctx.shadowColor = CONFIG.LUXURY_COLORS.GOLD;
                ctx.fillStyle = CONFIG.LUXURY_COLORS.GOLD;
                ctx.beginPath(); ctx.arc(GAME.food.x*size + size/2, GAME.food.y*size + size/2, size/3 + pulse/10, 0, Math.PI*2); ctx.fill();

                // Snake
                Renderer.drawSnake();

                // Particles
                GAME.particles.forEach(p => {
                    ctx.save();
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                    ctx.restore();
                });
            },

            gameOver() {
                GAME.active = false;
                const earned = Math.floor(GAME.score * 1.5);
                GAME.coins += earned;
                if(GAME.score > GAME.highScore) GAME.highScore = GAME.score;
                
                document.getElementById('over-score').innerText = GAME.score;
                document.getElementById('over-coins').innerText = '+' + earned;
                
                UI.saveData();
                UI.changeScreen('over');
                document.getElementById('canvas-aura').style.opacity = '0';
            }
        };

        // --- UI & STORAGE MANAGEMENT ---
        const UI = {
            activeModals: { shop: false, missions: false },
            currentShopTab: 'skins',

            init() {
                this.loadData();
                this.renderRatingStars();
                this.checkMissions();
                Renderer.init();
                this.applyEnv();
                lucide.createIcons();
                document.getElementById('app').style.opacity = '1';
            },

            loadData() {
                const raw = localStorage.getItem('snake_legend_final_v4');
                if(raw) {
                    const parsed = JSON.parse(raw);
                    Object.assign(GAME, parsed);
                }
                this.updateGlobalHUD();
            },

            saveData() {
                localStorage.setItem('snake_legend_final_v4', JSON.stringify(GAME));
                this.updateGlobalHUD();
            },

            updateGlobalHUD() {
                document.getElementById('stat-high-score').innerText = GAME.highScore;
                document.getElementById('stat-coins').innerText = Math.floor(GAME.coins);
                
                const hasRewards = GAME.missions.some(m => m.complete && !m.claimed);
                document.getElementById('mission-notifier').classList.toggle('hidden', !hasRewards);
            },

            changeScreen(id) {
                const screens = ['start', 'game', 'over'];
                screens.forEach(s => {
                    const el = document.getElementById(`screen-${s}`);
                    if(s === id) {
                        el.classList.remove('hidden-screen');
                        el.classList.remove('hidden');
                    } else {
                        el.classList.add('hidden-screen');
                        setTimeout(() => el.classList.add('hidden'), 1000);
                    }
                });
            },

            toggle(modalName) {
                const el = document.getElementById(`modal-${modalName}`);
                this.activeModals[modalName] = !this.activeModals[modalName];
                
                if(this.activeModals[modalName]) {
                    el.classList.remove('hidden');
                    if(modalName === 'shop') this.renderShop();
                    if(modalName === 'missions') this.renderMissions();
                } else {
                    el.classList.add('hidden');
                }
            },

            setShopTab(tab) {
                this.currentShopTab = tab;
                this.renderShop();
            },

            renderShop() {
                const container = document.getElementById('shop-content');
                container.innerHTML = '';
                
                // Tabs Highlighting
                ['skins', 'upgrades', 'environments'].forEach(t => {
                    const btn = document.getElementById(`btn-tab-${t}`);
                    if(t === this.currentShopTab) {
                        btn.className = 'pb-8 text-xs font-black uppercase tracking-[0.4em] border-b-2 border-amber-500 text-white transition-all';
                    } else {
                        btn.className = 'pb-8 text-xs font-black uppercase tracking-[0.4em] border-b-2 border-transparent text-zinc-500 hover:text-white transition-all';
                    }
                });

                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-2 gap-12';

                if(this.currentShopTab === 'skins') {
                    SKINS.forEach(s => {
                        const owned = GAME.ownedSkins.includes(s.id);
                        const active = GAME.currentSkin === s.id;
                        grid.innerHTML += `
                            <div class="group p-12 rounded-[4rem] border ${active?'border-amber-500 bg-amber-500/5':'border-white/5 bg-white/5'} transition-all text-center">
                                <div class="w-28 h-28 mx-auto mb-10 flex items-center justify-center rounded-[3rem] luxury-blur group-hover:scale-110 transition-transform">
                                    <div class="w-16 h-16 rounded-2xl shadow-2xl" style="background:${s.grad?`linear-gradient(45deg,${s.grad[0]},${s.grad[2]})`:s.color}; transform:${s.type==='diamond'?'rotate(45deg)':'none'}; border-radius:${s.type==='circle'?'50%':'12px'}"></div>
                                </div>
                                <h4 class="text-4xl font-display italic mb-3">${s.name}</h4>
                                <div class="hud-label mb-10">${owned ? 'ممتلك' : s.price + ' ذهب'}</div>
                                <button onclick="${owned?`UI.selectSkin('${s.id}')`:`UI.buySkin('${s.id}',${s.price})`}" class="w-full py-6 rounded-3xl font-mono text-xs font-black uppercase tracking-widest transition-all ${active?'bg-amber-500 text-black':(owned?'bg-white/10 text-white':'bg-white text-black active:scale-95')}" ${active?'disabled':''}>
                                    ${active ? 'نشط الآن' : (owned ? 'تفعيل' : 'شراء')}
                                </button>
                            </div>
                        `;
                    });
                } else if (this.currentShopTab === 'upgrades') {
                    UPGRADES.forEach(u => {
                        const level = GAME.upgrades[u.id] || 0;
                        const maxed = level >= u.max;
                        grid.innerHTML += `
                            <div class="group p-12 rounded-[5rem] bg-white/5 border border-white/5 flex items-center justify-between hover:bg-white/10 transition-all">
                                <div class="flex items-center gap-10">
                                    <div class="w-24 h-24 rounded-[2.5rem] luxury-blur flex items-center justify-center"><i data-lucide="${u.icon}" class="w-10 h-10 text-amber-500"></i></div>
                                    <div>
                                        <h4 class="text-4xl font-display italic mb-2">${u.name}</h4>
                                        <p class="text-xs text-zinc-500 font-medium">${u.desc}</p>
                                        <div class="flex gap-2 mt-6">
                                            ${Array.from({length: u.max}).map((_, i) => `<div class="h-2 w-10 rounded-full ${i<level?'bg-amber-500':'bg-white/5 shadow-inner'}"></div>`).join('')}
                                        </div>
                                    </div>
                                </div>
                                <button onclick="${maxed?'':`UI.buyUpgrade('${u.id}',${u.cost})`}" class="px-10 py-6 rounded-full font-mono text-xs font-black transition-all ${maxed?'bg-zinc-800 text-zinc-600':'bg-white text-black hover:scale-105 active:scale-95'}" ${maxed?'disabled':''}>
                                    ${maxed ? 'MAX' : u.cost + ' 💎'}
                                </button>
                            </div>
                        `;
                    }, '');
                    grid.className = 'space-y-8';
                } else {
                    ENVIRONMENTS.forEach(e => {
                        const owned = GAME.ownedEnvs.includes(e.id);
                        const active = GAME.currentEnv === e.id;
                        grid.innerHTML += `
                            <div class="group p-10 rounded-[4rem] border ${active?'border-amber-500 bg-amber-500/5':'border-white/5 bg-white/10'} overflow-hidden">
                                <div class="w-full h-40 rounded-[2.5rem] mb-8" style="background:${e.bg}"></div>
                                <h4 class="text-3xl font-display italic mb-2">${e.name}</h4>
                                <div class="hud-label mb-8">${owned ? 'ممتلك' : e.price + ' ذهب'}</div>
                                <button onclick="${owned?`UI.selectEnv('${e.id}')`:`UI.buyEnv('${e.id}',${e.price})`}" class="w-full py-6 rounded-3xl font-mono text-xs font-black uppercase tracking-widest transition-all ${active?'bg-amber-500 text-black':(owned?'bg-white/10 text-white':'bg-white text-black')}" ${active?'disabled':''}>
                                    ${active ? 'الحالي' : (owned ? 'تغيير' : 'شراء')}
                                </button>
                            </div>
                        `;
                    });
                }

                container.appendChild(grid);
                lucide.createIcons();
            },

            buySkin(id, price) {
                if(GAME.coins >= price) {
                    GAME.coins -= price;
                    GAME.ownedSkins.push(id);
                    this.saveData(); this.renderShop();
                }
            },
            selectSkin(id) { GAME.currentSkin = id; this.saveData(); this.renderShop(); },

            buyUpgrade(id, cost) {
                if(GAME.coins >= cost) {
                    GAME.coins -= cost;
                    GAME.upgrades[id]++;
                    this.saveData(); this.renderShop();
                }
            },

            buyEnv(id, price) {
                if(GAME.coins >= price) {
                    GAME.coins -= price;
                    GAME.ownedEnvs.push(id);
                    this.saveData(); this.renderShop();
                }
            },
            selectEnv(id) { GAME.currentEnv = id; this.applyEnv(); this.saveData(); this.renderShop(); },

            applyEnv() {
                const env = ENVIRONMENTS.find(e => e.id === GAME.currentEnv);
                const bg = document.getElementById('main-bg');
                bg.style.background = env.bg;
                // Add specific overlay effects if needed
            },

            checkMissions() {
                const today = new Date().toDateString();
                if(GAME.lastMissionCheck !== today) {
                    GAME.missions = [
                        { id: 1, text: 'التهام 50 قطعة طعام', target: 50, progress: 0, prize: 2000, complete: false, claimed: false },
                        { id: 2, text: 'تحقيق نتيجة 70 في جولة واحدة', target: 70, progress: 0, prize: 5000, complete: false, claimed: false },
                        { id: 3, text: 'العب 10 جولات كاملة', target: 10, progress: 0, prize: 1500, complete: false, claimed: false }
                    ];
                    GAME.lastMissionCheck = today;
                    this.saveData();
                }
            },

            renderMissions() {
                const list = document.getElementById('mission-list');
                list.innerHTML = GAME.missions.map(m => `
                    <div class="mission-card p-12 rounded-[3.5rem] luxury-blur ${m.complete ? 'border-amber-500/30 bg-amber-500/5':''}">
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-2xl font-display italic">${m.text}</span>
                            <span class="hud-label">${m.progress} / ${m.target}</span>
                        </div>
                        <div class="h-2 w-full bg-white/5 rounded-full overflow-hidden mb-8">
                            <div class="h-full bg-amber-500 transition-all duration-1000" style="width: ${(m.progress/m.target)*100}%"></div>
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-3 text-amber-500 font-black"><i data-lucide="gem" class="w-5 h-5"></i> +${m.prize}</div>
                            ${m.complete && !m.claimed ? `<button onclick="UI.claim(${m.id})" class="px-10 py-3 bg-white text-black rounded-full font-black text-xs">استلام الجائزة</button>` : 
                              (m.claimed ? `<span class="hud-label text-emerald-500">تم التحصيل</span>` : `<span class="hud-label">قيد التنفيذ...</span>`)}
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            },

            claim(id) {
                const m = GAME.missions.find(m => m.id === id);
                if(m && m.complete && !m.claimed) {
                    m.claimed = true;
                    GAME.coins += m.prize;
                    this.saveData();
                    this.renderMissions();
                }
            },

            renderRatingStars() {
                const container = document.getElementById('start-rating');
                container.innerHTML = '';
                for(let i=1; i<=5; i++) {
                    const s = document.createElement('i');
                    s.setAttribute('data-lucide', 'star');
                    s.className = `w-7 h-7 cursor-pointer transition-all hover:scale-125 ${i<=GAME.rating?'text-amber-400 fill-amber-400':'text-zinc-800'}`;
                    s.onclick = () => { GAME.rating = i; this.saveData(); this.renderRatingStars(); };
                    container.appendChild(s);
                }
                lucide.createIcons();
            }
        };

        // --- INPUT HANDLERS ---
        window.addEventListener('keydown', e => {
            if(!GAME.active) return;
            const key = e.key;
            if(key === 'ArrowUp' && GAME.direction !== 'DOWN') GAME.nextDirection = 'UP';
            if(key === 'ArrowDown' && GAME.direction !== 'UP') GAME.nextDirection = 'DOWN';
            if(key === 'ArrowLeft' && GAME.direction !== 'RIGHT') GAME.nextDirection = 'LEFT';
            if(key === 'ArrowRight' && GAME.direction !== 'LEFT') GAME.nextDirection = 'RIGHT';
        });

        // Initialize App
        UI.init();

    </script>
</body>
</html>
