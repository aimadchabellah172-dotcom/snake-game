<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE ZEN - النسخة الفاخرة الهادئة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=IBM+Plex+Sans+Arabic:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981; /* Emerald */
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --font-main: 'Outfit', 'IBM Plex Sans Arabic', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: #f8fafc;
            font-family: var(--font-main);
            overflow: hidden;
            margin: 0;
            user-select: none;
            touch-action: none;
        }

        /* --- شاشة التحميل --- */
        #loading-screen {
            background: var(--bg);
            z-index: 100;
        }

        .loader-bar {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .loader-progress {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- الواجهة --- */
        .glass {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .screen-container {
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .hidden {
            display: none !important;
            opacity: 0;
            transform: scale(0.95);
        }

        /* --- تأثيرات اللعبة --- */
        canvas {
            background-color: #111827;
            border-radius: 2rem;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s ease-out;
        }

        /* أنيميشن للحياة */
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .animate-soft { animation: pulse-soft 3s infinite ease-in-out; }

        @keyframes slide-up {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-in { animation: slide-up 0.6s ease-out forwards; }

        /* الكيانات */
        .mission-item {
            transition: all 0.3s;
        }
        .mission-item:hover { border-color: var(--primary); background: rgba(16, 185, 129, 0.05); }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- 1. شاشة التحميل -->
    <div id="loading-screen" class="fixed inset-0 flex flex-col items-center justify-center">
        <div class="mb-8">
            <i data-lucide="zap" class="w-12 h-12 text-emerald-400 animate-pulse"></i>
        </div>
        <h2 class="text-xl font-light tracking-[0.3em] uppercase text-emerald-400 mb-6">SNAKE ZEN</h2>
        <div class="loader-bar">
            <div id="load-progress" class="loader-progress"></div>
        </div>
    </div>

    <!-- 2. القائمة الرئيسية -->
    <div id="main-menu" class="screen-container hidden flex flex-col items-center gap-8 w-full max-w-md animate-in">
        <div class="text-center">
            <h1 class="text-7xl font-extrabold tracking-tighter text-white mb-2">ثعبان<span class="text-emerald-500">.</span></h1>
            <p class="text-slate-500 uppercase tracking-widest text-xs font-bold">Zen Edition</p>
        </div>

        <div class="flex gap-4 w-full">
            <div class="glass flex-1 p-6 rounded-[2rem] text-center">
                <span class="text-[10px] text-slate-500 uppercase font-black block mb-1">الرقم القياسي</span>
                <span id="best-score" class="text-3xl font-bold text-white">0</span>
            </div>
            <div class="glass flex-1 p-6 rounded-[2rem] text-center">
                <span class="text-[10px] text-slate-500 uppercase font-black block mb-1">الجواهر</span>
                <div class="flex items-center justify-center gap-2">
                    <i data-lucide="gem" class="w-4 h-4 text-emerald-400"></i>
                    <span id="wallet-balance" class="text-3xl font-bold text-white">0</span>
                </div>
            </div>
        </div>

        <button onclick="startGame()" class="w-full py-8 bg-emerald-500 text-slate-900 rounded-[2rem] font-extrabold text-2xl hover:bg-emerald-400 hover:scale-[1.02] active:scale-95 transition-all shadow-xl shadow-emerald-500/20">
            ابدأ الرحلة
        </button>

        <div class="grid grid-cols-2 gap-4 w-full">
            <button onclick="showScreen('shop')" class="glass p-5 rounded-[1.5rem] flex items-center justify-center gap-3 hover:bg-white/5 transition-colors group">
                <i data-lucide="shopping-bag" class="w-5 h-5 text-emerald-400 group-hover:rotate-12 transition-transform"></i>
                <span class="text-sm font-bold">المتجر</span>
            </button>
            <button onclick="showScreen('missions')" class="glass p-5 rounded-[1.5rem] flex items-center justify-center gap-3 hover:bg-white/5 transition-colors group relative">
                <i data-lucide="target" class="w-5 h-5 text-emerald-400 group-hover:rotate-12 transition-transform"></i>
                <span class="text-sm font-bold">المهمات</span>
                <span id="mission-alert" class="hidden absolute -top-1 -right-1 w-3 h-3 bg-rose-500 rounded-full border-2 border-[#0f172a]"></span>
            </button>
        </div>
    </div>

    <!-- 3. نظام المهمات -->
    <div id="screen-missions" class="screen-container hidden flex flex-col w-full max-w-md animate-in">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold">مهمات اليوم</h2>
            <button onclick="showScreen('main')" class="p-3 glass rounded-full"><i data-lucide="arrow-left"></i></button>
        </div>
        <div id="missions-list" class="space-y-4 overflow-y-auto max-h-[60vh] pr-2">
            <!-- Dynamic Content -->
        </div>
    </div>

    <!-- 4. المتجر -->
    <div id="screen-shop" class="screen-container hidden flex flex-col w-full max-w-md animate-in">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold">تخصيص</h2>
            <button onclick="showScreen('main')" class="p-3 glass rounded-full"><i data-lucide="arrow-left"></i></button>
        </div>
        <div class="grid grid-cols-2 gap-4" id="shop-grid">
            <!-- Dynamic Content -->
        </div>
    </div>

    <!-- 5. واجهة اللعب -->
    <div id="screen-game" class="screen-container hidden flex flex-col items-center gap-6 w-full animate-in">
        <div class="flex items-center justify-between w-full max-w-[500px] mb-2 px-4">
            <div class="flex flex-col">
                <span class="text-[10px] text-slate-500 uppercase font-black">النقاط</span>
                <span id="ingame-score" class="text-3xl font-bold text-emerald-400">0</span>
            </div>
            <div class="flex gap-3">
                <div id="combo-tag" class="hidden px-4 py-1 bg-rose-500/20 text-rose-500 rounded-full text-xs font-black animate-bounce">COMBO X2</div>
                <button onclick="pauseGame()" class="p-3 glass rounded-full"><i data-lucide="pause" class="w-5 h-5"></i></button>
            </div>
        </div>
        
        <div class="relative">
            <canvas id="game-canvas"></canvas>
            <div id="pause-overlay" class="hidden absolute inset-0 glass rounded-[2rem] flex items-center justify-center">
                <button onclick="resumeGame()" class="bg-white text-black p-6 rounded-full shadow-2xl scale-125"><i data-lucide="play" class="fill-current"></i></button>
            </div>
        </div>

        <!-- أزرار التحكم للجوال -->
        <div class="grid grid-cols-3 gap-3 mt-4 lg:hidden">
            <div></div>
            <button class="glass p-6 rounded-2xl active:bg-emerald-500/20 transition-colors" ontouchstart="setDirection('UP')"><i data-lucide="chevron-up"></i></button>
            <div></div>
            <button class="glass p-6 rounded-2xl active:bg-emerald-500/20 transition-colors" ontouchstart="setDirection('LEFT')"><i data-lucide="chevron-right"></i></button>
            <button class="glass p-6 rounded-2xl active:bg-emerald-500/20 transition-colors" ontouchstart="setDirection('DOWN')"><i data-lucide="chevron-down"></i></button>
            <button class="glass p-6 rounded-2xl active:bg-emerald-500/20 transition-colors" ontouchstart="setDirection('RIGHT')"><i data-lucide="chevron-left"></i></button>
        </div>
    </div>

    <!-- 6. شاشة النهاية -->
    <div id="screen-over" class="screen-container hidden flex flex-col items-center gap-8 animate-in text-center">
        <div class="w-24 h-24 bg-rose-500/10 rounded-full flex items-center justify-center mb-4">
            <i data-lucide="skull" class="w-12 h-12 text-rose-500"></i>
        </div>
        <h2 class="text-5xl font-black">تحطمت!</h2>
        <div class="glass p-10 rounded-[3rem] min-w-[300px]">
            <p class="text-xs text-slate-500 uppercase tracking-widest mb-2">النتيجة النهائية</p>
            <p id="final-score" class="text-6xl font-bold text-white mb-6">0</p>
            <div class="flex justify-center gap-3 items-center text-emerald-400">
                <i data-lucide="gem" class="w-5 h-5"></i>
                <span id="earned-gems" class="text-xl font-bold">+0</span>
            </div>
        </div>
        <div class="flex flex-col gap-4 w-full">
            <button onclick="startGame()" class="py-6 bg-emerald-500 text-slate-900 rounded-[2rem] font-extrabold text-xl">حاول مجدداً</button>
            <button onclick="showScreen('main')" class="text-slate-500 font-bold hover:text-white transition-colors">العودة للرئيسية</button>
        </div>
    </div>

    <script>
        // --- البيانات والوضع العام ---
        let state = {
            highScore: parseInt(localStorage.getItem('zen_snake_hs')) || 0,
            gems: parseInt(localStorage.getItem('zen_snake_gems')) || 0,
            ownedSkins: JSON.parse(localStorage.getItem('zen_snake_skins')) || ['default'],
            currentSkin: localStorage.getItem('zen_snake_active') || 'default',
            missions: [
                { id: 1, title: "صياد البداية", desc: "أكل 20 قطعة طعام", target: 20, progress: 0, reward: 50, claimed: false },
                { id: 2, title: "المحترف", desc: "صل لنتيجة 100", target: 100, progress: 0, reward: 200, claimed: false },
                { id: 3, title: "سيد الزن", desc: "العب 5 مرات", target: 5, progress: 0, reward: 100, claimed: false }
            ]
        };

        const skins = {
            'default': { name: 'الأصلي', color: '#10b981', price: 0 },
            'ocean': { name: 'المحيط', color: '#0ea5e9', price: 100 },
            'rose': { name: 'الورد', color: '#f43f5e', price: 250 },
            'gold': { name: 'الفاخر', color: '#fbbf24', price: 500 },
            'void': { name: 'الفراغ', color: '#8b5cf6', price: 1000 }
        };

        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const GRID = 20;
        let snake = [], food = {}, dx = 0, dy = -1, score = 0, gameLoop, paused = false;

        // --- نظام التوجيه والواجهة ---
        window.onload = () => {
            const bar = document.getElementById('load-progress');
            bar.style.width = "100%";
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
                showScreen('main');
                lucide.createIcons();
            }, 2200);
            updateUI();
        };

        function showScreen(id) {
            document.querySelectorAll('.screen-container').forEach(s => s.classList.add('hidden'));
            document.getElementById(`screen-${id === 'main' ? 'main-menu' : id}`).classList.remove('hidden');
            if (id === 'shop') renderShop();
            if (id === 'missions') renderMissions();
            lucide.createIcons();
        }

        function updateUI() {
            document.getElementById('best-score').innerText = state.highScore;
            document.getElementById('wallet-balance').innerText = state.gems;
            const hasUnclaimed = state.missions.some(m => m.progress >= m.target && !m.claimed);
            document.getElementById('mission-alert').classList.toggle('hidden', !hasUnclaimed);
        }

        // --- منطق اللعبة ---
        function startGame() {
            const size = Math.min(window.innerWidth - 40, 500);
            canvas.width = size; canvas.height = size;
            const tiles = Math.floor(size / GRID);

            showScreen('game');
            score = 0;
            paused = false;
            dx = 0; dy = -1;
            snake = [{x: 10, y: 10}, {x:10, y:11}, {x:10, y:12}];
            
            placeFood(tiles);
            clearInterval(gameLoop);
            gameLoop = setInterval(() => update(tiles), 110);
            
            // تحديث مهمات المحاولة
            trackMission(3, 1);
        }

        function update(tiles) {
            if (paused) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // تصادم
            if (head.x < 0 || head.x >= tiles || head.y < 0 || head.y >= tiles ||
                snake.some(s => s.x === head.x && s.y === head.y)) {
                return gameOver();
            }

            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('ingame-score').innerText = score;
                placeFood(tiles);
                
                // تحديث المهمات
                trackMission(1, 1);
                if (score >= 100) trackMission(2, 100);
            } else {
                snake.pop();
            }
            draw(tiles);
        }

        function draw(tiles) {
            const sz = canvas.width / tiles;
            ctx.fillStyle = '#111827';
            ctx.fillRect(0,0, canvas.width, canvas.height);

            // طعام
            ctx.fillStyle = '#f43f5e';
            ctx.beginPath();
            ctx.roundRect(food.x * sz + 4, food.y * sz + 4, sz - 8, sz - 8, 8);
            ctx.fill();

            // ثعبان
            const skinColor = skins[state.currentSkin].color;
            snake.forEach((s, i) => {
                ctx.fillStyle = i === 0 ? '#fff' : skinColor;
                ctx.beginPath();
                ctx.roundRect(s.x * sz + 1, s.y * sz + 1, sz - 2, sz - 2, i === 0 ? 8 : 4);
                ctx.fill();
            });
        }

        function placeFood(tiles) {
            food = { x: Math.floor(Math.random()*tiles), y: Math.floor(Math.random()*tiles) };
            if (snake.some(s => s.x === food.x && s.y === food.y)) placeFood(tiles);
        }

        function gameOver() {
            clearInterval(gameLoop);
            showScreen('over');
            document.getElementById('final-score').innerText = score;
            const earned = Math.floor(score / 2);
            document.getElementById('earned-gems').innerText = `+${earned}`;
            state.gems += earned;
            if (score > state.highScore) state.highScore = score;
            save();
            updateUI();
        }

        function pauseGame() { paused = !paused; document.getElementById('pause-overlay').classList.toggle('hidden'); }
        function resumeGame() { paused = false; document.getElementById('pause-overlay').classList.add('hidden'); }

        // --- المتجر والمهمات ---
        function renderShop() {
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = Object.entries(skins).map(([id, s]) => {
                const owned = state.ownedSkins.includes(id);
                const active = state.currentSkin === id;
                return `
                    <div class="glass p-5 rounded-[2rem] flex flex-col items-center gap-4 ${active ? 'border-emerald-500' : ''}">
                        <div class="w-12 h-12 rounded-xl" style="background:${s.color}; box-shadow: 0 0 20px ${s.color}44"></div>
                        <div class="text-center">
                            <p class="font-bold text-sm text-white">${s.name}</p>
                            <p class="text-[10px] text-slate-500 font-bold">${owned ? 'ممتلك' : s.price + ' جوهرة'}</p>
                        </div>
                        <button onclick="${owned ? `setSkin('${id}')` : `buySkin('${id}', ${s.price})`}" class="w-full py-3 rounded-xl text-xs font-black ${active ? 'bg-emerald-500 text-slate-900' : 'bg-white/5'}">
                            ${active ? 'مفعل' : (owned ? 'تفعيل' : 'شراء')}
                        </button>
                    </div>
                `;
            }).join('');
        }

        function buySkin(id, price) {
            if (state.gems >= price) {
                state.gems -= price; state.ownedSkins.push(id); save(); renderShop(); updateUI();
            }
        }

        function setSkin(id) { state.currentSkin = id; save(); renderShop(); }

        function renderMissions() {
            const list = document.getElementById('missions-list');
            list.innerHTML = state.missions.map(m => `
                <div class="glass p-6 rounded-[1.5rem] mission-item">
                    <div class="flex justify-between items-center mb-3">
                        <div>
                            <h4 class="font-bold text-white">${m.title}</h4>
                            <p class="text-[10px] text-slate-500">${m.desc}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-emerald-400 font-bold text-xs">+${m.reward} ج</p>
                            <p class="text-[9px] text-slate-500">${m.progress}/${m.target}</p>
                        </div>
                    </div>
                    ${m.claimed ? 
                        `<span class="text-[10px] font-black text-slate-600 uppercase">تم الاستلام ✓</span>` : 
                        (m.progress >= m.target ? 
                            `<button onclick="claimMission(${m.id})" class="w-full py-2 bg-white text-black rounded-lg text-xs font-black">استلام الجائزة</button>` :
                            `<div class="h-1 w-full bg-white/5 rounded-full"><div class="h-full bg-emerald-500 rounded-full" style="width:${(m.progress/m.target)*100}%"></div></div>`)
                    }
                </div>
            `).join('');
        }

        function trackMission(id, val) {
            const m = state.missions.find(m => m.id === id);
            if (m && m.progress < m.target) {
                m.progress = id === 2 ? Math.max(m.progress, val) : m.progress + val;
                save();
            }
        }

        function claimMission(id) {
            const m = state.missions.find(m => m.id === id);
            if (m && !m.claimed && m.progress >= m.target) {
                m.claimed = true; state.gems += m.reward; save(); renderMissions(); updateUI();
            }
        }

        function save() {
            localStorage.setItem('zen_snake_hs', state.highScore);
            localStorage.setItem('zen_snake_gems', state.gems);
            localStorage.setItem('zen_snake_skins', JSON.stringify(state.ownedSkins));
            localStorage.setItem('zen_snake_active', state.currentSkin);
        }

        function setDirection(dir) {
            if (dir === 'UP' && dy === 0) { dx = 0; dy = -1; }
            if (dir === 'DOWN' && dy === 0) { dx = 0; dy = 1; }
            if (dir === 'LEFT' && dx === 0) { dx = 1; dy = 0; }
            if (dir === 'RIGHT' && dx === 0) { dx = -1; dy = 0; }
        }

        window.addEventListener('keydown', e => setDirection(e.key.replace('Arrow', '').toUpperCase()));
        
        // منع التمرير على الجوال
        document.addEventListener('touchmove', function(e) { if(GAME_ON) e.preventDefault(); }, { passive: false });

    </script>
</body>
</html>
